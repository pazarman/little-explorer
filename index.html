<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#8fd5f7">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>{n}'s World</title>
<script>if (location.search.includes("test")) document.documentElement.dataset.test = "1";</script>
<style>
  /* Nuclear bypass for automated tests: disable ALL motion immediately if ?test is in URL */
  html[data-test] *, 
  html[data-test] *::before, 
  html[data-test] *::after {
    animation: none !important;
    transition: none !important;
    animation-duration: 0s !important;
    transition-duration: 0s !important;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family:"Comic Sans MS","Segoe UI",system-ui,sans-serif;
    background:linear-gradient(#8fd5f7, #c9efb0 65%, #8fd06a);
    transition:background .5s;
  }
  body.theme-snow   { background:linear-gradient(#1d3f8f, #4f8fd8 60%, #cfeaff); }
  body.theme-ocean  { background:linear-gradient(#8fdcf0, #2fa7c9 55%, #0e6e96); }
  body.theme-pizza  { background:linear-gradient(#ffd98a, #ffb35c 60%, #e8843c); }
  body.theme-bike   { background:linear-gradient(#9bdcf7, #cdeefb 45%, #a8e08c 70%, #79c861); }
  body.theme-pasta  { background:repeating-conic-gradient(#f3ece0 0% 25%, #e25b4a 0% 50%) 0 0 / 16vmin 16vmin; }
  body.theme-trace  { background:linear-gradient(#4d3390, #8a5fc9 55%, #c9aef0); }
  body.theme-memory { background:linear-gradient(#f7c948, #f08a4b 60%, #d9663a); }
  body.theme-music  { background:linear-gradient(#3b2a6e, #7a4fb8 55%, #c86bb1); }
  body.theme-whosays{ background:linear-gradient(#2f9e6e, #57c98a 55%, #bdeccf); }
  body.theme-story  { background:linear-gradient(#244b8f, #6f8fd0 60%, #f0d6a8); }
  body.theme-space  { background:linear-gradient(#070726, #181848 50%, #34215c); }
  body.theme-dragon { background:linear-gradient(#3a1c4a, #7a3b8a 50%, #e08a5a); }
  body.theme-dino   { background:linear-gradient(#5c9e57, #9ed07e 55%, #e6dba0); }
  body.theme-icecream { background:linear-gradient(#ffd1e8, #ffe6c0 55%, #bfe8ff); }
  body.theme-pets   { background:linear-gradient(#ffe6a8, #ffd2e0 55%, #b8e6c0); }
  body.theme-dressup { background:linear-gradient(#ffe0f2, #e2e6ff 60%, #d8f0e0); }
  body.theme-sort   { background:linear-gradient(#5aa9d6, #9fd0e8 55%, #dff0f8); }

  .screen { position:absolute; inset:0; display:flex; flex-direction:column;
            align-items:center; justify-content:center; padding:2vmin;
            animation:screenIn .44s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes screenIn { 0%{opacity:0; transform:scale(.86);} 100%{opacity:1; transform:scale(1);} }
  /* contextual transitions: drilling forward slides in from the right, going home from the left */
  .screen.fwd  { animation:enterFwd  .44s cubic-bezier(0.34,1.56,0.64,1) both; }
  .screen.back { animation:enterBack .44s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes enterFwd  { 0%{opacity:0; transform:translateX(30vw) scale(.9);}  100%{opacity:1; transform:translateX(0) scale(1);} }
  @keyframes enterBack { 0%{opacity:0; transform:translateX(-24vw) scale(.9);} 100%{opacity:1; transform:translateX(0) scale(1);} }
  /* quick child-friendly "wipe" flash when scenery changes */
  #wipe { position:fixed; inset:0; z-index:120; pointer-events:none; opacity:0;
          background:radial-gradient(circle at 50% 45%, rgba(255,255,255,.92), rgba(255,255,255,.55) 45%, rgba(255,255,255,0) 72%); }
  #wipe.run { animation:wipeFlash .46s ease-out; }
  @keyframes wipeFlash { 0%{opacity:0; transform:scale(.4);} 35%{opacity:.7;} 100%{opacity:0; transform:scale(1.6);} }
  .hidden { display:none !important; }
  button { font-family:inherit; cursor:pointer; }

  /* ================= WORLD MAP HUB ================= */
  #hub { padding:0; overflow:hidden; }
  #hub h1 {
    position:absolute; top:1.2vmin; width:100%; text-align:center; z-index:5;
    font-size:clamp(22px, 5vmin, 46px); color:#fff;
    text-shadow:0 3px 0 rgba(0,0,0,.25); pointer-events:none;
  }
  #map { position:relative; width:100%; height:100%; }
  #mapBg { position:absolute; inset:0; width:100%; height:100%; }
  .sun { position:absolute; top:1.5vmin; right:13vmin; font-size:clamp(34px,7.5vmin,68px);
         animation:spin 24s linear infinite; z-index:1; pointer-events:none; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .cloud { position:absolute; font-size:clamp(28px,6.5vmin,58px); opacity:.95; z-index:1;
           left:-15vw; animation:drift linear infinite; pointer-events:none; }
  @keyframes drift { to { transform:translateX(130vw); } }

  /* ---- Self-contained world node: flex column, no absolute/grid conflict ---- */
  .node { display:flex; flex-direction:column; align-items:center; gap:.7vmin;
          border:none; background:none; padding:0; }
  .node-disc {
    position:relative; width:clamp(58px,15vmin,118px); height:clamp(58px,15vmin,118px);
    border-radius:50%; display:flex; align-items:center; justify-content:center; overflow:hidden;
    font-size:clamp(28px,8vmin,58px); border:5px solid #fff;
    /* layered depth: drop + ambient cast, inner core shade, inner top sheen */
    box-shadow:0 6px 0 rgba(0,0,0,.16), 0 12px 22px rgba(0,0,0,.24),
               inset 0 -8px 11px rgba(0,0,0,.18), inset 0 7px 11px rgba(255,255,255,.42);
    transition:transform .5s cubic-bezier(0.175,0.885,0.32,1.275);   /* bouncy spring release */
  }
  /* glossy highlight sweep across the top of every disc */
  .node-disc::after { content:""; position:absolute; top:5%; left:13%; width:74%; height:44%;
    border-radius:50%; pointer-events:none;
    background:radial-gradient(closest-side, rgba(255,255,255,.72), rgba(255,255,255,0)); }
  .node-disc>span { position:relative; z-index:1; line-height:1; filter:drop-shadow(0 2px 2px rgba(0,0,0,.25)); }
  .node:active .node-disc { transform:scale(.82); transition:transform .09s ease-out; }   /* fast squish-in */
  .node-label { font-size:clamp(11px,2.1vmin,17px); font-weight:bold; color:#fff; max-width:26vmin;
    text-shadow:0 1px 0 rgba(0,0,0,.4); background:rgba(0,0,0,.2); padding:.12em .8em; border-radius:99px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .node-stars { font-size:clamp(10px,1.9vmin,15px); min-height:1.1em; letter-spacing:-1px; }
  .b-snow   { background:linear-gradient(#7fb6f7,#3a6fd0); }
  .b-ocean  { background:linear-gradient(#4fc4e0,#1583ad); }
  .b-memory { background:linear-gradient(#ffd166,#e8913a); }
  .b-bike   { background:linear-gradient(#8fd96a,#4a9e35); }
  .b-music  { background:linear-gradient(#c77ff2,#8246c8); }
  .b-whosays{ background:linear-gradient(#5ad29a,#2f9e6e); }
  .b-pizza  { background:linear-gradient(#ffb04f,#e0701e); }
  .b-pasta  { background:linear-gradient(#f08a6a,#cf4530); }
  .b-trace  { background:linear-gradient(#b07fe8,#7444c4); }
  .b-paint  { background:linear-gradient(#ff8fb1,#e84393); }
  .b-story  { background:linear-gradient(#6f8fd0,#34508f); }
  .b-rocket { background:linear-gradient(#5a6bd8,#2a2f7a); }
  .b-sort   { background:linear-gradient(#7a5fd0,#3a2a7a); }
  .b-pattern{ background:linear-gradient(#9b6fe0,#5a3aa0); }
  .b-dragon { background:linear-gradient(#a05bc0,#6a2f8a); }
  .b-dino   { background:linear-gradient(#7fc96a,#3f8e35); }
  .b-icecream { background:linear-gradient(#ff9ec9,#e84393); }
  .b-petfeed { background:linear-gradient(#ffc06a,#e0852e); }
  .b-petmatch{ background:linear-gradient(#ffb38f,#e06a3a); }
  .b-petcare { background:linear-gradient(#7fd0e0,#2f8ea0); }
  .b-dressup { background:linear-gradient(#ff9ed6,#c84398); }
  .c-fantasy{ background:linear-gradient(#b57fe0,#6a3a9a); }
  .c-pets   { background:linear-gradient(#ffba6a,#e07a2e); }
  .c-num    { background:linear-gradient(#7fb6f7,#3a6fd0); }
  .c-shape  { background:linear-gradient(#ff9f4f,#e0701e); }
  .c-brain  { background:linear-gradient(#5ad29a,#2f9e6e); }
  .c-animal { background:linear-gradient(#ffd166,#e8913a); }
  .c-space  { background:linear-gradient(#5a6bd8,#26265a); }
  .c-create { background:linear-gradient(#ff8fb1,#e84393); }

  /* ---- World hub grid: auto-fit, centered, scroll-safe (never clips title/mascot) ---- */
  #mapNodes.cats { position:absolute; inset:0; display:grid;
                   grid-template-columns:repeat(auto-fit, minmax(clamp(96px,26vmin,150px), 1fr));
                   align-content:center; justify-items:center; gap:3vmin 1.5vmin;
                   padding:13vmin 4vmin 12vmin; z-index:4; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  @media (max-width:520px) { #mapNodes.cats { grid-template-columns:repeat(2,1fr); } }
  .node { animation:nodePop .55s cubic-bezier(0.34,1.56,0.64,1) backwards, catFloat 4.6s ease-in-out infinite;
          animation-delay:0s, .55s; }
  /* staggered idle bob so the grid breathes instead of sitting static */
  .node:nth-child(4n+1) { animation-delay:0s, .7s; }   .node:nth-child(4n+2) { animation-delay:0s, 1.6s; }
  .node:nth-child(4n+3) { animation-delay:0s, 2.5s; }   .node:nth-child(4n)   { animation-delay:0s, 3.4s; }
  @keyframes catFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-1vmin);} }
  @keyframes nodePop  { 0%{opacity:0; transform:scale(.3);} 100%{opacity:1; transform:scale(1);} }
  #games { padding-top:9vmin; }
  #games #gamesHome { position:absolute; top:2vmin; left:2vmin; z-index:10; }
  #gamesTitle { position:absolute; top:2.5vmin; width:100%; text-align:center; color:#fff;
                font-size:clamp(22px,5vmin,40px); text-shadow:0 3px 0 rgba(0,0,0,.25); pointer-events:none; padding:0 2vmin; }
  #gameNodes { display:grid; grid-template-columns:repeat(auto-fit, minmax(clamp(104px,28vmin,160px), 1fr));
               gap:3.4vmin 2vmin; align-content:center; justify-items:center; padding:2vmin; width:100%;
               max-width:680px; max-height:100%; overflow-y:auto; }
  @media (max-width:520px) { #gameNodes { grid-template-columns:repeat(2,1fr); } }
  #gameNodes .node-disc { width:clamp(72px,18vmin,124px); height:clamp(72px,18vmin,124px); font-size:clamp(34px,9.5vmin,64px); }

  /* name entry */
  #namescreen { background:linear-gradient(#8fd5f7,#c9efb0 70%,#8fd06a); z-index:78; }
  .name-card { background:#fff; border-radius:30px; padding:4vmin 5vmin; display:flex; flex-direction:column;
               align-items:center; gap:2.2vmin; box-shadow:0 8px 0 rgba(0,0,0,.2); max-width:92%; }
  .name-card .mascot { width:clamp(80px,18vmin,150px); }
  .name-card h2 { font-size:clamp(20px,4.6vmin,34px); color:#444; text-align:center; }
  #nameInput { font-family:inherit; font-size:clamp(20px,5vmin,32px); text-align:center; padding:1.6vmin 3vmin;
               border:3px solid #c9aef0; border-radius:18px; width:min(78vw,420px); color:#333; }
  #nameInput:focus { outline:none; border-color:#7444c4; }
  #nameStart { border:none; border-radius:20px; padding:2vmin 5vmin; font-family:inherit;
               font-size:clamp(18px,4vmin,28px); font-weight:bold; background:#ffd23e; color:#5b3c00; box-shadow:0 5px 0 rgba(0,0,0,.22); }
  #nameStart:active { transform:scale(.95); }
  #nameSkip { border:none; background:none; color:#aaa; font-family:inherit; font-size:clamp(13px,2.8vmin,18px); text-decoration:underline; }
  #setName { background:#cdeafe; color:#1b4e7a; }
  #setDash { background:#d8f0d0; color:#2b5e1f; }

  /* dress-up (drawn, composable SVG character + closet) */
  #dressup { padding:0; }
  #dressBar { display:flex; align-items:center; justify-content:center; gap:1.4vmin; width:100%; padding:1.2vmin; z-index:20; }
  #dressStage { flex:1; width:100%; display:flex; align-items:center; justify-content:center;
                transition:background .3s; min-height:0; padding:1vmin; }
  #dollWrap { width:clamp(150px,40vmin,300px); max-height:100%; display:flex; }
  .dollsvg { width:100%; height:auto; max-height:100%; overflow:visible; filter:drop-shadow(0 6px 8px rgba(0,0,0,.18)); }
  .dollsvg g { transform-box:fill-box; transform-origin:center; }
  /* the layer that just changed pops in; the whole doll gives a happy wiggle */
  .dollsvg g.pop { animation:partPop .45s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes partPop { 0%{transform:scale(.25);} 60%{transform:scale(1.2);} 100%{transform:scale(1);} }
  #dollWrap.snap { animation:dollSnap .4s ease-in-out; }
  @keyframes dollSnap { 0%,100%{transform:scale(1) rotate(0);} 40%{transform:scale(1.05) rotate(-1.5deg);} 70%{transform:scale(1.02) rotate(1deg);} }
  /* the closet drawer at the bottom */
  #closet { width:100%; background:linear-gradient(#ffffffee,#f1e6ff); border-top:3px solid #fff;
    border-radius:26px 26px 0 0; box-shadow:0 -4px 16px rgba(0,0,0,.13); padding:1.4vmin 1vmin 1.8vmin; z-index:20; }
  #closetTabs { display:flex; justify-content:center; gap:1.2vmin; margin-bottom:1.2vmin; flex-wrap:wrap; }
  .ctab { border:none; border-radius:50%; width:clamp(40px,8.5vmin,58px); height:clamp(40px,8.5vmin,58px);
    font-size:clamp(19px,4.6vmin,30px); background:#ececf2; box-shadow:0 3px 0 rgba(0,0,0,.15);
    transition:transform .09s ease-out; }
  .ctab:active { transform:scale(.9); }
  .ctab.sel { background:#ffd23e; box-shadow:0 3px 0 #d9a400; }
  #closetTray { display:flex; gap:1.6vmin; overflow-x:auto; padding:1vmin .6vmin .4vmin;
    -webkit-overflow-scrolling:touch; scroll-snap-type:x proximity; }
  .cslot { flex:0 0 auto; border:3px solid #fff; border-radius:18px; scroll-snap-align:center; overflow:hidden;
    width:clamp(56px,13vmin,88px); height:clamp(56px,13vmin,88px); font-size:clamp(28px,7vmin,50px);
    background:radial-gradient(circle at 40% 32%, #fff, #e7ecf5); box-shadow:0 4px 0 rgba(0,0,0,.16);
    display:flex; align-items:center; justify-content:center; transition:transform .09s ease-out; padding:0; }
  .cslot svg { width:100%; height:100%; display:block; }
  .cslot.none-slot { color:#b6b9c4; font-weight:bold; font-size:clamp(13px,3vmin,18px); }
  .cslot:active { transform:scale(.86); }
  .cslot.sel { border-color:#ffd23e; box-shadow:0 0 0 3px #ffd23e, 0 4px 0 rgba(0,0,0,.16); }

  /* dashboard */
  #dashboard { justify-content:flex-start; padding-top:8vmin; overflow-y:auto; }
  #dashHome { position:absolute; top:2vmin; left:2vmin; z-index:10; }
  #dashboard h2 { font-size:clamp(20px,4.6vmin,34px); color:#fff; text-shadow:0 3px 0 rgba(0,0,0,.25); margin-bottom:2vmin; }
  #dashStats { display:grid; grid-template-columns:repeat(3,1fr); gap:1.6vmin; width:100%; max-width:680px; margin-bottom:2.5vmin; padding:0 2vmin; }
  @media (max-width:560px) { #dashStats { grid-template-columns:repeat(2,1fr); } }
  .stat { background:rgba(255,255,255,.92); border-radius:18px; padding:2vmin 1vmin; text-align:center; box-shadow:0 4px 0 rgba(0,0,0,.15); }
  .stat .sv { font-size:clamp(20px,4.6vmin,32px); font-weight:bold; color:#444; }
  .stat .sl { font-size:clamp(11px,2.4vmin,16px); color:#888; }
  #dashList { width:100%; max-width:680px; padding:0 2vmin 4vmin; }
  .dash-cat { background:rgba(255,255,255,.92); border-radius:18px; padding:1.6vmin 2.4vmin; margin-bottom:1.6vmin; box-shadow:0 4px 0 rgba(0,0,0,.12); }
  .dash-cat h3 { font-size:clamp(15px,3.2vmin,22px); color:#7444c4; margin-bottom:.8vmin; }
  .dash-row { display:flex; justify-content:space-between; align-items:center; padding:.5vmin 0; font-size:clamp(13px,2.8vmin,19px); color:#555; border-top:1px solid #eee; }
  .dash-row .dp { font-size:clamp(13px,2.8vmin,19px); margin:0; background:none; }

  /* buddy chooser */
  #charscreen { background:linear-gradient(#b8a0ee,#c9efb0 75%,#8fd06a); z-index:78; }
  .char-card { background:#fff; border-radius:30px; padding:3.5vmin 4vmin; display:flex; flex-direction:column;
               align-items:center; gap:2.4vmin; box-shadow:0 8px 0 rgba(0,0,0,.2); max-width:94%;
               max-height:92vh; overflow-y:auto; }
  .char-card h2 { font-size:clamp(20px,4.6vmin,34px); color:#444; text-align:center; }
  .char-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2vmin; }
  @media (max-width:420px) { .char-grid { grid-template-columns:repeat(2,1fr); } }
  .char-btn { border:none; background:#f4f0fc; border-radius:20px; padding:1.6vmin 1vmin; display:flex;
              flex-direction:column; align-items:center; gap:.4vmin; box-shadow:0 4px 0 rgba(0,0,0,.12); }
  .char-btn:active { transform:scale(.92); }
  .char-btn.sel { background:#ffd23e; outline:4px solid #f0a813; }
  .char-btn .ch-e { font-size:clamp(34px,8vmin,58px); line-height:1; }
  .char-btn .ch-n { font-size:clamp(12px,2.6vmin,18px); font-weight:bold; color:#555; }
  #charDone { border:none; border-radius:20px; padding:1.8vmin 5vmin; font-family:inherit;
              font-size:clamp(18px,4vmin,28px); font-weight:bold; background:#ffd23e; color:#5b3c00; box-shadow:0 5px 0 rgba(0,0,0,.22); }
  #charDone:active { transform:scale(.95); }
  #setBuddy { background:#e7dcff; color:#5a3aa0; }

  .corner-btn { position:absolute; z-index:6; border:none; border-radius:50%;
    width:clamp(44px,9vmin,66px); height:clamp(44px,9vmin,66px); font-size:clamp(20px,4.4vmin,32px);
    background:#fff; box-shadow:0 4px 0 rgba(0,0,0,.2); }
  .corner-btn:active { transform:scale(.92); }
  #bookBtn { top:1.4vmin; right:1.4vmin; }
  #settingsBtn { bottom:1.4vmin; left:1.4vmin; opacity:.85; }

  /* ================= MASCOT ================= */
  .mascot { pointer-events:none; animation:mbob 3s ease-in-out infinite; }
  .mascot svg { width:100%; height:auto; filter:drop-shadow(0 4px 4px rgba(0,0,0,.25)); }
  @keyframes mbob  { 50% { transform:translateY(-1vmin); } }
  .mascot.talking   { animation:mtalk .38s ease-in-out infinite; }
  @keyframes mtalk { 50% { transform:translateY(-.7vmin) rotate(2deg); } }
  .mascot.celebrate { animation:mjump .55s ease-in-out infinite; }
  @keyframes mjump { 50% { transform:translateY(-3vmin) rotate(-3deg); } }
  .mascot .eyes { transform-box:fill-box; transform-origin:center; animation:blink 4.2s infinite; }
  @keyframes blink { 0%,93%,100% { transform:scaleY(1);} 95.5% { transform:scaleY(.1);} }
  .mascot .armR { transform-box:fill-box; transform-origin:0% 100%; animation:wave 3.4s ease-in-out infinite; }
  @keyframes wave { 0%,68%,100% { transform:rotate(0);} 78% { transform:rotate(-24deg);} 88% { transform:rotate(6deg);} }
  #hubMascot   { position:absolute; left:1%; bottom:3%; width:clamp(74px,15vmin,140px); font-size:clamp(64px,13vmin,124px); z-index:4; }
  #gameMascot  { position:fixed; left:1vmin; bottom:1vmin; width:clamp(58px,11.5vmin,100px); font-size:clamp(50px,10vmin,90px); z-index:30; }
  #celebMascot { width:clamp(95px,21vmin,180px); font-size:clamp(84px,19vmin,164px); }
  .mascot .buddy { display:block; line-height:1; text-align:center; filter:drop-shadow(0 4px 4px rgba(0,0,0,.25));
                   transform-origin:center bottom; animation:buddyIdle 5.5s ease-in-out infinite; }
  /* occasional happy wiggle/ear-flick when the buddy is just hanging out */
  @keyframes buddyIdle { 0%,80%,100%{transform:rotate(0) scale(1);}
                         86%{transform:rotate(-8deg) scale(1.06);}
                         92%{transform:rotate(6deg) scale(1.05);}
                         97%{transform:rotate(-2deg) scale(1.02);} }
  .mascot.talking .buddy   { animation:buddyTalk .4s ease-in-out infinite; }
  @keyframes buddyTalk { 50%{transform:scale(1.08) rotate(-3deg);} }

  /* ================= GAME ================= */
  #game header {
    display:flex; align-items:center; gap:1.6vmin; width:100%; max-width:980px;
    padding:1vmin 1.6vmin; z-index:20;
  }
  .round-btn {
    border:none; border-radius:50%; width:clamp(48px, 9vmin, 72px); height:clamp(48px, 9vmin, 72px);
    font-size:clamp(22px, 4.5vmin, 34px); background:#fff; box-shadow:0 4px 0 rgba(0,0,0,.2); flex-shrink:0;
  }
  .round-btn:active { transform:scale(.92); }
  #instruction {
    flex:1; background:rgba(255,255,255,.93); border-radius:20px; padding:1.4vmin 2.2vmin;
    font-size:clamp(16px, 3.6vmin, 28px); font-weight:bold; color:#333; text-align:center;

  .dragon { width:clamp(150px,34vmin,300px); font-size:clamp(96px,26vmin,220px); line-height:1;
            display:flex; align-items:center; justify-content:center; filter:drop-shadow(0 5px 6px rgba(0,0,0,.35)); }
  .dragon-svg { width:100%; height:auto; display:block; }
  .dragon.chomp { animation:chomp .32s ease; }

  .treat-row { display:flex; gap:2.6vmin; flex-wrap:wrap; justify-content:center;
               background:rgba(255,255,255,.28); border-radius:20px; padding:1.6vmin 2.2vmin; }
  .treat { width:clamp(50px,11.5vmin,84px); height:clamp(50px,11.5vmin,84px); border:none; background:none;
           font-size:clamp(34px,8vmin,60px); touch-action:none; filter:drop-shadow(0 2px 2px rgba(0,0,0,.3)); }

  /* ----- dino eggs ----- */
  .dino-egg { position:absolute; border:none; background:none; font-size:clamp(46px,11vmin,86px); z-index:5;
              animation:floaty 3s ease-in-out infinite; filter:drop-shadow(0 2px 3px rgba(0,0,0,.3)); line-height:1; }

  /* ----- ice cream (stacking toy) ----- */
  .ice-stage { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
               justify-content:flex-end; padding:1.5vmin 2vmin 3vmin; z-index:5; gap:2.4vmin; }
  .ice-stack { position:relative; flex-shrink:0;
               width:clamp(120px,34vmin,260px); height:clamp(150px,44vmin,340px); }
  /* solid, detailed waffle cone anchored at the bottom-center */
  .ice-cone { position:absolute; left:50%; bottom:0; transform:translateX(-50%);
    width:clamp(56px,15vmin,116px); height:clamp(70px,19vmin,150px);
    background:linear-gradient(#e0b06a,#c8893f);
    background-image:repeating-linear-gradient(48deg, rgba(110,64,18,.4) 0 2px, transparent 2px 10px),
                     repeating-linear-gradient(-48deg, rgba(110,64,18,.4) 0 2px, transparent 2px 10px);
    clip-path:polygon(50% 100%, 0 0, 100% 0); }
  .scoop { position:absolute; left:50%; transform:translateX(-50%);
    width:clamp(58px,15.5vmin,120px); height:clamp(46px,12vmin,94px); border-radius:50% 50% 46% 46%;
    box-shadow:inset -6px -9px 0 rgba(0,0,0,.12), inset 6px 7px 9px rgba(255,255,255,.45), 0 2px 4px rgba(0,0,0,.22);
    animation:scoopWobble .62s cubic-bezier(.34,1.3,.6,1) both; }
  /* squash-and-stretch: drop in, squish flat on impact, rebound tall, settle */
  @keyframes scoopWobble {
    0%   { transform:translate(-50%,-46vh) scaleY(1.1); opacity:0; }
    55%  { opacity:1; }
    72%  { transform:translate(-50%,0) scale(1.24,.72); }
    86%  { transform:translate(-50%,-1.2vh) scale(.9,1.14); }
    100% { transform:translate(-50%,0) scale(1,1); } }
  .cherry-top { position:absolute; left:50%; transform:translateX(-50%); z-index:6; line-height:1;
    font-size:clamp(26px,7vmin,52px); animation:scoopWobble .55s cubic-bezier(.34,1.3,.6,1) both; }
  .tub-row { display:flex; gap:2.4vmin; flex-wrap:wrap; justify-content:center; align-items:flex-end; }
  /* bright scoop "tubs" with a gradient scoop bulging out of a cup */
  .tub { position:relative; border:none; background:none; flex-shrink:0;
    width:clamp(54px,12.5vmin,92px); height:clamp(62px,14.5vmin,108px);
    transition:transform .09s ease-out; }
  .tub:active { transform:scale(.88); }
  .tub-cup { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:88%; height:54%;
    border-radius:8px 8px 16px 16px; background:linear-gradient(#ffffff,#dde4ee);
    box-shadow:inset 0 -4px 0 rgba(0,0,0,.1), 0 4px 0 rgba(0,0,0,.18); }
  .tub-scoop { position:absolute; top:0; left:50%; transform:translateX(-50%); width:92%; height:66%;
    border-radius:50% 50% 44% 44%; border:3px solid #fff;
    background:radial-gradient(circle at 38% 30%, rgba(255,255,255,.7), transparent 46%), var(--c);
    box-shadow:inset -4px -6px 0 rgba(0,0,0,.12); }
  .ice-cherry { border:none; border-radius:22px; padding:1.2vmin 3.4vmin; font-weight:bold; color:#7a1f2b;
    font-size:clamp(26px,7vmin,48px); background:#fff; box-shadow:0 5px 0 rgba(0,0,0,.2); }
  .ice-cherry:active { transform:scale(.93); }

  @keyframes cherryPulse { 50% { transform:scale(1.12); } }

  /* ----- pets ----- */
  .pet-choices { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
                 gap:4vmin; flex-wrap:wrap; padding:2vmin; z-index:5; }
  .pet-choice { border:none; background:rgba(255,255,255,.92); border-radius:28px;
                width:clamp(80px,18vmin,150px); height:clamp(80px,18vmin,150px);
                font-size:clamp(44px,11vmin,90px); box-shadow:0 6px 0 rgba(0,0,0,.2); }
  .pet-choice:active { transform:scale(.93); }
  .petcare-wrap { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
                  justify-content:center; gap:3vmin; z-index:5; }
  .care-pet { font-size:clamp(90px,24vmin,200px); line-height:1; filter:drop-shadow(0 5px 6px rgba(0,0,0,.3)); }
  .care-pet.happy { animation:chomp .4s ease; }

  .care-tools { display:flex; gap:3vmin; }
  .care-tool { border:none; background:#fff; border-radius:24px; width:clamp(64px,15vmin,110px);

  .care-tool:active { transform:translateY(4px); }

  /* ================= STICKER BOOK ================= */
  #stickerbook { overflow:hidden; padding:1vmin; gap:1vmin; }
  #bookTop { display:flex; align-items:center; gap:1.4vmin; width:100%; max-width:980px; padding:.5vmin; z-index:3; }
  #sceneBtns { flex:1; display:flex; gap:1vmin; overflow-x:auto; justify-content:center; flex-wrap:wrap; }
  .scene-btn { border:none; border-radius:50px; padding:1vmin 2.4vmin; font-family:inherit; font-weight:bold;
               font-size:clamp(13px,2.8vmin,19px); background:rgba(255,255,255,.85); color:#555; box-shadow:0 3px 0 rgba(0,0,0,.15); white-space:nowrap; }
  .scene-btn.sel { background:#ffd23e; color:#5b3c00; }
  #stickerScene { position:relative; flex:1; width:100%; max-width:980px; z-index:2;
                  border-radius:18px; overflow:hidden; box-shadow:inset 0 0 0 3px rgba(255,255,255,.4); }
  #stickerScene.sc-park   { background:linear-gradient(#bfe9ff,#d8f7c8 70%,#9bd870); }
  #stickerScene.sc-space  { background:linear-gradient(#0a0a2e,#241a55 60%,#3a2a66); }
  #stickerScene.sc-ocean  { background:linear-gradient(#9fe4f5,#3aa9cc 55%,#0e6e96); }
  #stickerScene.sc-castle { background:linear-gradient(#ffd6f0,#e0b3ff 55%,#b692e8); }
  #stickerScene.sc-bed    { background:linear-gradient(#3a2a6e,#6a5aa8 60%,#caa0e0); }
  .scene-deco { position:absolute; bottom:1vmin; width:100%; text-align:center;
                font-size:clamp(26px,7vmin,52px); pointer-events:none; opacity:.95; letter-spacing:1vmin; }
  #stickerHint { color:#fff; font-size:clamp(13px,2.8vmin,20px); z-index:2; padding:.4vmin;
                 text-shadow:0 2px 0 rgba(0,0,0,.3); text-align:center; }
  #stickerPalette { display:flex; gap:1.4vmin; width:100%; max-width:980px; overflow-x:auto; padding:1.2vmin;
                    background:rgba(255,255,255,.25); border-radius:18px; z-index:3; align-items:center; min-height:11vmin; }
  .pal-item { border:none; background:rgba(255,255,255,.8); border-radius:14px; flex-shrink:0;
              width:clamp(46px,10vmin,74px); height:clamp(46px,10vmin,74px); font-size:clamp(28px,6.5vmin,48px); box-shadow:0 3px 0 rgba(0,0,0,.15); }
  .pal-item.sel { background:#ffd23e; outline:4px solid #f0a813; transform:scale(1.08); }
  .sticker { position:absolute; transform:translate(-50%,-50%); font-size:clamp(40px,9vmin,80px);
             touch-action:none; cursor:grab; filter:drop-shadow(0 3px 3px rgba(0,0,0,.35)); z-index:5; animation:bounceIn .4s;
             transition:transform .18s cubic-bezier(0.34,1.56,0.64,1), filter .18s ease; }
  /* lifted off the page while dragging — bigger, tilted, fuzzy shadow cast below */
  .sticker.lifted { transform:translate(-50%,-50%) scale(1.28) rotate(4deg); cursor:grabbing;
                    filter:drop-shadow(0 14px 12px rgba(0,0,0,.4)); z-index:30; transition:none; }
  .sticker.settle { animation:stickSettle .42s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes stickSettle { 0%{transform:translate(-50%,-50%) scale(1.28) rotate(4deg);}
                           55%{transform:translate(-50%,-50%) scale(.9) rotate(-2deg);}
                           100%{transform:translate(-50%,-50%) scale(1) rotate(0);} }
  #bookHome, #sceneClear { flex-shrink:0; }

  /* ================= PAINT ================= */
  #paint { padding:0; }
  #paintBar { display:flex; align-items:center; gap:1vmin; width:100%; padding:1vmin 1.4vmin;
              flex-wrap:wrap; justify-content:center; z-index:20; }
  #swatches { display:flex; gap:1vmin; flex-wrap:wrap; justify-content:center; }
  .swatch { width:clamp(34px,7vmin,52px); height:clamp(34px,7vmin,52px); border-radius:50%;
            border:3px solid #fff; box-shadow:0 3px 0 rgba(0,0,0,.2); }
  .swatch.sel { outline:4px solid #ffd23e; outline-offset:2px; transform:scale(1.12); }
  #paintBar .round-btn { width:clamp(42px,8vmin,60px); height:clamp(42px,8vmin,60px); font-size:clamp(18px,4vmin,28px); }
  #paintBar .round-btn.on { background:#ffd23e; }
  #paintCanvasWrap { position:relative; flex:1; width:100%; max-width:980px; margin:0 auto 1vmin;
                     background:rgba(255,255,255,.92); border-radius:16px; overflow:hidden;
                     box-shadow:inset 0 0 0 3px rgba(255,255,255,.5); }
  #paintC { position:absolute; inset:0; width:100%; height:100%; touch-action:none; }
  #paintInstruct {
    position:absolute; top:13.5vmin; width:min(90%, 480px); left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,.94); border-radius:20px; padding:1.2vmin 2.4vmin;
    font-size:clamp(15px,3.2vmin,24px); font-weight:bold; color:#444; text-align:center;
    box-shadow:0 4px 12px rgba(0,0,0,.15); z-index:25; pointer-events:none;
    opacity:0; transition:opacity .4s, transform .4s; transform:translateX(-50%) translateY(-10px);
  }
  #paintInstruct.on { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ================= STORY ================= */
  #story { padding:0; }
  .story-scene { position:absolute; inset:0; display:flex; flex-direction:column;
                 align-items:center; justify-content:center; cursor:pointer; }
  .story-art { font-size:clamp(54px,15vmin,130px); text-align:center; line-height:1.3;
               filter:drop-shadow(0 4px 5px rgba(0,0,0,.3)); margin-bottom:2vmin; pointer-events:none; }
  .story-textbox { background:rgba(255,255,255,.94); border-radius:22px; max-width:88%; margin:0 2vmin;
                   padding:2.4vmin 3vmin; font-size:clamp(17px,3.7vmin,28px); color:#333; line-height:1.45;
                   text-align:center; box-shadow:0 5px 0 rgba(0,0,0,.18); pointer-events:none; }
  .story-tap-hint { color:#fff; font-size:clamp(13px,2.8vmin,20px); margin-top:1.6vmin;
                    text-shadow:0 2px 0 rgba(0,0,0,.3); pointer-events:none; animation:hintPulse 1.8s ease-in-out infinite; }
  @keyframes hintPulse { 50% { opacity:.5; } }
  .story-nav { position:absolute; bottom:2vmin; width:100%; display:flex; align-items:center;
               justify-content:center; gap:3vmin; z-index:10; }
  #storyDots { display:flex; gap:1.2vmin; }
  #storyDots .sdot { width:clamp(10px,2.4vmin,16px); height:clamp(10px,2.4vmin,16px); border-radius:50%;
                     background:rgba(255,255,255,.45); border:2px solid #fff; }
  #storyDots .sdot.on { background:#ffd23e; }
  #storyHome { position:absolute; top:2vmin; left:2vmin; z-index:10; }
  #storyRead { position:absolute; top:2vmin; right:2vmin; z-index:10; }

  /* ================= SETTINGS ================= */
  #settings { background:rgba(20,20,60,.6); z-index:75; }
  .settings-card { background:#fff; border-radius:24px; padding:3vmin 4vmin; max-width:92%;
                   box-shadow:0 8px 0 rgba(0,0,0,.2); display:flex; flex-direction:column; gap:2.4vmin; }
  .settings-card h2 { font-size:clamp(20px,4.5vmin,32px); color:#444; text-align:center; }
  .settings-card .row { display:flex; flex-direction:column; gap:.8vmin; }
  .settings-card .row > span { font-size:clamp(14px,3vmin,20px); color:#666; font-weight:bold; }
  .seg { display:flex; gap:1vmin; flex-wrap:wrap; }
  .seg button { border:none; border-radius:14px; padding:1.4vmin 2.4vmin; font-size:clamp(14px,3vmin,20px);
                font-weight:bold; background:#eee; color:#555; box-shadow:0 3px 0 rgba(0,0,0,.12); }
  .seg button.sel { background:#7444c4; color:#fff; }
  .settings-card .closeRow { display:flex; gap:2vmin; justify-content:center; margin-top:1vmin; }
  .settings-card .closeRow button { border:none; border-radius:18px; padding:1.6vmin 4vmin;
    font-size:clamp(16px,3.4vmin,24px); font-weight:bold; box-shadow:0 4px 0 rgba(0,0,0,.18); }
  #setDone { background:#ffd23e; color:#5b3c00; }
  #setReset { background:#f0a0a0; color:#7a1f1f; }

  /* ================= CELEBRATE ================= */
  #celebrate {
    position:fixed; inset:0; background:rgba(20,20,60,.55); z-index:80;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2vmin;
  }
  #celebrate .big { font-size:clamp(30px, 8vmin, 64px); color:#fff; font-weight:bold;
                    text-shadow:0 4px 0 rgba(0,0,0,.35); text-align:center; animation:bounceIn .6s; }
  #celebrate .sticker-reveal { font-size:clamp(54px, 13vmin, 110px); animation:bounceIn .8s; }
  #celebrate .sub { font-size:clamp(16px, 3.6vmin, 28px); color:#ffd23e; font-weight:bold;
                    text-shadow:0 2px 0 rgba(0,0,0,.35); text-align:center; }
  @keyframes bounceIn { 0%{transform:scale(0);} 60%{transform:scale(1.25);} 100%{transform:scale(1);} }
  #celebrate .btns { display:flex; gap:3vmin; flex-wrap:wrap; justify-content:center; }
  #celebrate button {
    border:none; border-radius:22px; padding:2.2vmin 4vmin;
    font-size:clamp(17px, 3.8vmin, 28px); font-weight:bold; background:#ffd23e; color:#5b3c00;
    box-shadow:0 5px 0 rgba(0,0,0,.25);
  }
  #celebrate button:active { transform:scale(.94); }

  #musicBtn { position:fixed; bottom:2vmin; right:2vmin; z-index:70; opacity:.55; }
  #musicBtn.on { opacity:1; background:#ffd23e; }

  /* ================= ROCKET QUEST ================= */
  #questBar { position:absolute; left:50%; bottom:1.4vmin; transform:translateX(-50%); z-index:6;
    display:flex; align-items:center; gap:1.1vmin; border:none;
    background:rgba(255,255,255,.24); border-radius:99px; padding:.7vmin 1.8vmin;
    box-shadow:0 4px 0 rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.4); max-width:88vw; }
  #questBar:active { transform:translateX(-50%) scale(.95); }
  .q-rocket { font-size:clamp(22px,5vmin,40px); line-height:1; filter:drop-shadow(0 2px 2px rgba(0,0,0,.3));
    animation:qrock 3s ease-in-out infinite; }
  @keyframes qrock { 50% { transform:translateY(-.5vmin) rotate(-5deg); } }
  .q-slots { display:flex; gap:.6vmin; }
  .q-slot { width:clamp(16px,3.4vmin,26px); height:clamp(16px,3.4vmin,26px); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:clamp(10px,2.3vmin,17px);
    background:rgba(0,0,0,.16); border:2px solid rgba(255,255,255,.6); }
  .q-slot.filled { background:radial-gradient(circle at 50% 38%, #fff6b0, #ffd23e); border-color:#fff;
    box-shadow:0 0 8px #ffd23e; }
  .q-slot.pop { animation:qpop .55s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes qpop { 0%{transform:scale(0) rotate(-40deg);} 60%{transform:scale(1.45);} 100%{transform:scale(1) rotate(0);} }

  #rocketLaunch { position:fixed; inset:0; z-index:110; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:3vmin; overflow:hidden;
    background:radial-gradient(circle at 50% 120%, #34215c, #0a0a26 70%); }
  #rocketLaunch::before { content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(2px 2px at 20% 30%, #fff, transparent),
               radial-gradient(2px 2px at 70% 20%, #fff, transparent),
               radial-gradient(2px 2px at 40% 60%, #fff, transparent),
               radial-gradient(2px 2px at 85% 70%, #fff, transparent),
               radial-gradient(2px 2px at 55% 85%, #fff, transparent),
               radial-gradient(2px 2px at 10% 80%, #fff, transparent);
    opacity:.8; animation:twinkle 2.4s ease-in-out infinite; }
  @keyframes twinkle { 50% { opacity:.35; } }
  .rl-text { color:#fff; font-weight:bold; text-align:center; padding:0 4vmin; z-index:2;
    font-size:clamp(20px,5vmin,40px); text-shadow:0 3px 0 rgba(0,0,0,.4); }
  .rl-rocket { font-size:clamp(80px,22vmin,180px); line-height:1; z-index:2;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,.5)); }
  .rl-rocket.shake { animation:rlShake .12s linear infinite; }
  @keyframes rlShake { 0%,100%{transform:translate(0,0) rotate(0);} 25%{transform:translate(-1.5vmin,0) rotate(-2deg);} 75%{transform:translate(1.5vmin,0) rotate(2deg);} }
  .rl-rocket.blast { animation:rlBlast 2.6s cubic-bezier(.45,0,.9,.35) forwards; }
  @keyframes rlBlast { 0%{transform:translateY(0) scale(1);} 30%{transform:translateY(-6vh) scale(1.05);} 100%{transform:translateY(-130vh) scale(.4);} }
  .rl-count { color:#ffd23e; font-weight:bold; font-size:clamp(40px,12vmin,110px); z-index:2;
    text-shadow:0 3px 0 rgba(0,0,0,.4); min-height:1.1em; }
</style>

<body>

<div id="hub" class="screen">
  <div id="map">
    <svg id="mapBg" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="20" cy="14" rx="24" ry="15" fill="#bfe3ff" fill-opacity=".5"/>
      <ellipse cx="78" cy="20" rx="26" ry="16" fill="#aee59a" fill-opacity=".5"/>
      <ellipse cx="24" cy="48" rx="24" ry="16" fill="#7fd4e8" fill-opacity=".45"/>
      <ellipse cx="78" cy="60" rx="26" ry="18" fill="#ffd28f" fill-opacity=".5"/>
      <ellipse cx="30" cy="82" rx="26" ry="16" fill="#dcc3f5" fill-opacity=".5"/>
      <polyline id="mapPath" fill="none" stroke="#fff" stroke-opacity=".9"
                stroke-width="1.1" stroke-dasharray="2.4 1.8" stroke-linecap="round"/>
    </svg>
    <div class="sun">☀️</div>
    <div class="cloud" style="top:7%;  animation-duration:44s;">☁️</div>
    <div class="cloud" style="top:30%; animation-duration:60s; animation-delay:-28s;">☁️</div>
    <div class="cloud" style="top:2%;  animation-duration:72s; animation-delay:-50s;">☁️</div>
    <h1>🌈 {n}'s World 🌈</h1>
    <div id="mapNodes"></div>
    <div id="hubMascot" class="mascot"></div>
    <button id="questBar" aria-label="Rocket quest">
      <span class="q-rocket">🚀</span>
      <span class="q-slots" id="questSlots"></span>
    </button>
    <button class="corner-btn" id="bookBtn" aria-label="Sticker book">📒</button>
    <button class="corner-btn" id="settingsBtn" aria-label="Grown-up settings">⚙️</button>
  </div>
</div>

<div id="games" class="screen hidden">
  <button class="round-btn" id="gamesHome" aria-label="Home">🏠</button>
  <h1 id="gamesTitle"></h1>
  <div id="gameNodes"></div>
</div>

<div id="namescreen" class="screen hidden">
  <div class="name-card">
    <div class="mascot" id="nameMascot"></div>
    <h2>Hi there! What's your name?</h2>
    <input id="nameInput" type="text" maxlength="12" placeholder="Type a name…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="nameStart">Let's play! 🎉</button>
    <button id="nameSkip">Skip for now</button>
  </div>
</div>

<div id="charscreen" class="screen hidden">
  <div class="char-card">
    <h2>Pick your buddy!</h2>
    <div class="char-grid" id="charGrid"></div>
    <button id="charDone">Let's go! 🎉</button>
  </div>
</div>

<div id="game" class="screen hidden">
  <header>
    <button class="round-btn" id="homeBtn" aria-label="Home">🏠</button>
    <div id="instruction"></div>
    <button class="round-btn" id="speakBtn" aria-label="Repeat">🔊</button>
  </header>
  <div id="playArea"></div>
  <div id="progress"></div>
  <div id="gameMascot" class="mascot"></div>
</div>

<script>
"use strict";
let NAME = localStorage.getItem("fionaName") || "Explorer";

const $ = id => document.getElementById(id);
const rand = arr => arr[Math.floor(Math.random() * arr.length)];
const shuffle = arr => arr.slice().sort(() => Math.random() - .5);
const randBetween = (a, b) => a + Math.random() * (b - a);
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const IRREGULAR = { snowman: "snowmen", reindeer: "reindeer" };
function plural(noun, n) {
  if (n === 1) return noun;
  if (IRREGULAR[noun]) return IRREGULAR[noun];
  if (/[^aeiou]y$/.test(noun)) return noun.slice(0, -1) + "ies";
  return noun + "s";
}

/* ================= Lifecycle & Persistence Registry ================= */
const core = {
  timers: new Set(),
  intervals: new Set(),
  pendingSaves: new Map(),
  saveTimer: null,
  
  // Register and return a timeout
  wait(fn, ms) {
    const id = setTimeout(() => { this.timers.delete(id); fn(); }, ms);
    this.timers.add(id);
    return id;
  },
  
  // Register and return an interval
  repeat(fn, ms) {
    const id = setInterval(fn, ms);
    this.intervals.add(id);
    return id;
  },
  
  // Clear all registered timers/intervals
  cleanup() {
    this.timers.forEach(clearTimeout);
    this.intervals.forEach(clearInterval);
    this.timers.clear();
    this.intervals.clear();
    if ("speechSynthesis" in window) speechSynthesis.cancel();
    state.busy = false; // Safety reset for stuck busy states
  },
  
  // Throttled persistence to avoid localStorage jank
  save(key, val) {
    this.pendingSaves.set(key, JSON.stringify(val));
    if (this.saveTimer) return;
    this.saveTimer = setTimeout(() => {
      this.pendingSaves.forEach((v, k) => localStorage.setItem(k, v));
      this.pendingSaves.clear();
      this.saveTimer = null;
    }, 2000); // 2s debounce: perfect for "quiet" moments
  },
  
  // Force immediate save (e.g. before page unload)
  flush() {
    if (!this.saveTimer) return;
    this.pendingSaves.forEach((v, k) => localStorage.setItem(k, v));
    this.pendingSaves.clear();
    clearTimeout(this.saveTimer);
    this.saveTimer = null;
  }
};
window.addEventListener("beforeunload", () => core.flush());

/* ================= Persistent state ================= */
const completions = JSON.parse(localStorage.getItem("fionaStars") || "{}");
const stickers = JSON.parse(localStorage.getItem("fionaStickers") || "[]");
let settings = Object.assign({ diff: "auto", voice: 1, music: "bouncy" },
  JSON.parse(localStorage.getItem("fionaSettings") || "{}"));
const perf = JSON.parse(localStorage.getItem("fionaPerf") || "{}");
const saveCompletions = () => core.save("fionaStars", completions);
const saveStickers = () => core.save("fionaStickers", stickers);
const saveSettings = () => core.save("fionaSettings", settings);
const savePerf = () => core.save("fionaPerf", perf);

/* ===== Centralized quest ===== */
const QUEST_GOAL = 6;
let sparks = +(localStorage.getItem("fionaSparks") || 0);
let trips  = +(localStorage.getItem("fionaTrips")  || 0);
let questShown = sparks, questGreeted = false;
const saveQuest = () => { core.save("fionaSparks", sparks); core.save("fionaTrips", trips); };

/* difficulty tier 0..2 for a level */
function ensurePerf(level) {
  if (!perf[level]) perf[level] = { roundsPlayed: 0, roundsNoMistake: 0, roundsWithManyMistakes: 0, emaScore: 0.6 };
  return perf[level];
}
function roundScore(mistakes) {
  if (mistakes <= 0) return 1.0;
  if (mistakes === 1) return 0.75;
  if (mistakes === 2) return 0.5;
  return 0.2;
}
function recordRoundPerf(level, mistakes) {
  const p = ensurePerf(level);
  p.roundsPlayed++;
  if (mistakes === 0) p.roundsNoMistake++;
  if (mistakes >= 3) p.roundsWithManyMistakes++;
  const score = roundScore(mistakes);
  p.emaScore = clamp(p.emaScore * 0.7 + score * 0.3, 0, 1);
  savePerf();
}
function autoTierFor(level) {
  const p = ensurePerf(level);
  // Early sessions: stay conservative and use completion progress gently.
  if (p.roundsPlayed < 4) return clamp(Math.floor((completions[level] || 0) / 2), 0, 1);
  if (p.emaScore >= 0.8) return 2;
  if (p.emaScore >= 0.55) return 1;
  return 0;
}
function tierFor(level) {
  if (settings.diff === "easy") return 0;
  if (settings.diff === "med") return 1;
  if (settings.diff === "hard") return 2;
  return autoTierFor(level);
}

const state = { level: null, round: 0, busy: false, tier: 0 };
let roundMistakes = 0;

/* ================= Mascot ================= */
function mascotSVG() {

}
function setMascots(cls, on) { document.querySelectorAll(".mascot").forEach(m => m.classList.toggle(cls, on)); }

/* ================= Buddy (choosable guide character) ================= */
const BUDDIES = [

/* ================= Speech & sound ================= */
let lastSpeakEnd = 0;
function speak(text, opts = {}) {
  if (!settings.voice || !("speechSynthesis" in window)) { lastSpeakEnd = performance.now(); return; }
  if (!opts.queue) speechSynthesis.cancel();
  lastSpeakEnd = performance.now() + Math.min(7000, 500 + text.length * 72);   // estimated finish time
  const u = new SpeechSynthesisUtterance(text + " ");   // trailing space: stops Chrome clipping the last word
  u.rate = opts.rate || 0.95;
  u.pitch = opts.pitch || 1.25;
  setMascots("talking", true);
  
  const stopTalk = () => {
    if (!speechSynthesis.speaking && !speechSynthesis.pending) {
      setMascots("talking", false);
    }
  };
  u.onend = stopTalk; u.onerror = stopTalk;
  core.wait(() => setMascots("talking", false), Math.min(11000, 700 + text.length * 95));
  speechSynthesis.speak(u);
  // keep-alive: Chrome silently stops synthesis after ~15s unless nudged
  core.repeat(() => {
    if (speechSynthesis.speaking) speechSynthesis.resume();
  }, 4000);
}
// wait roughly as long as the praise takes to speak (capped) before running cb — so it's never cut off
function waitSpeech(cb, opts = {}) {
  const min = opts.min != null ? opts.min : 900, cap = opts.cap != null ? opts.cap : 4500;
  const wait = clamp(lastSpeakEnd - performance.now(), min, cap);
  core.wait(cb, wait);
}

let actx = null;
function audio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === "suspended") actx.resume();
  return actx;
}
function tone(freq, start, dur, type = "sine", vol = 0.22) {
  const ctx = audio(), o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, ctx.currentTime + start);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
  o.connect(g).connect(ctx.destination);
  o.start(ctx.currentTime + start); o.stop(ctx.currentTime + start + dur);
}
// "Plump" voice — one filtered oscillator with a glide + soft attack/decay so taps
// sound round & organic instead of beepy. Pitch and lowpass cutoff both swoop.
function voice(o) {
  const ctx = audio(), t0 = ctx.currentTime + (o.start || 0), dur = o.dur;
  const osc = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
  osc.type = o.type || "sine";
  osc.frequency.setValueAtTime(o.f0, t0);
  if (o.f1) osc.frequency.exponentialRampToValueAtTime(o.f1, t0 + dur);
  f.type = "lowpass";
  f.frequency.setValueAtTime(o.cut || 2600, t0);
  if (o.cut1) f.frequency.exponentialRampToValueAtTime(o.cut1, t0 + dur);
  const v = o.vol == null ? 0.2 : o.vol, atk = o.atk || 0.012;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(v, t0 + atk);            // soft attack (no click)
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);       // smooth decay
  osc.connect(f).connect(g).connect(ctx.destination);
  osc.start(t0); osc.stop(t0 + dur + 0.03);
}
const sfx = {
  // soft organic bubble "pop" — body + a quieter sub-octave for roundness
  tap()  { voice({ type:"sine", f0:430, f1:760, dur:.13, cut:1700, cut1:3200, vol:.22, atk:.006 });
           voice({ type:"triangle", f0:215, f1:380, dur:.13, cut:1300, vol:.09, atk:.006 }); },
  tick() { voice({ type:"sine", f0:900, f1:1160, dur:.07, cut:3000, vol:.09 }); },
  // rich ascending magical chime: stacked sine+triangle, then a high sparkle
  good() { [523.25, 659.25, 784, 1046.5].forEach((fr, i) => {
             voice({ type:"sine", f0:fr, dur:.34, start:i*.085, cut:4200, vol:.16, atk:.01 });
             voice({ type:"triangle", f0:fr, dur:.30, start:i*.085, cut:2600, vol:.07 }); });
           voice({ type:"sine", f0:1568, f1:2093, dur:.5, start:.34, cut:6000, vol:.10 }); },
  // soft wooden-block "tock" for invalid taps — gentle, never harsh
  bad()  { voice({ type:"triangle", f0:300, f1:150, dur:.16, cut:1100, cut1:480, vol:.16, atk:.004 });
           voice({ type:"sine", f0:150, f1:90, dur:.16, cut:700, vol:.09, atk:.004 }); },
  win()  { [523.25, 659.25, 784, 1046.5, 1318.5].forEach((fr, i) => {
             voice({ type:"sine", f0:fr, dur:.42, start:i*.11, cut:5000, vol:.16, atk:.01 });
             voice({ type:"triangle", f0:fr, dur:.38, start:i*.11, cut:2800, vol:.07 }); });
           voice({ type:"sine", f0:2093, dur:.6, start:.58, cut:7000, vol:.10 }); }
};
const baseBad = sfx.bad;
sfx.bad = function (...args) {
  roundMistakes++;
  return baseBad.apply(this, args);
};

// selectable background music styles — each tune is [freq, beats]
const MUSIC = {

      [[392, 1], [440, 1], [523, 1], [440, 1], [392, 1], [330, 1], [392, 2], [523, 1], [494, 1], [440, 1], [392, 2], [0, 1]],
      [[659, 1], [587, 1], [523, 1], [587, 1], [659, 1], [659, 2], [587, 1], [587, 1], [587, 2], [659, 1], [784, 1], [784, 2], [0, 1]]
    ]
  },
  calm: {
    beat: 540, wave: "sine", bass: false, boing: false, tunes: [
      [[392, 2], [440, 2], [523, 2], [440, 2], [349, 2], [392, 4], [0, 2]],
      [[523, 2], [494, 2], [440, 2], [392, 4], [440, 2], [392, 4], [0, 2]],

    ]
  },

      [[392, 1], [392, 1], [523, 1], [392, 1], [330, 1], [392, 1], [262, 2], [0, 1]],
      [[440, 1], [440, 1], [440, 1], [349, 1], [523, 1], [523, 2], [0, 1]],
      [[523, 1], [392, 1], [523, 1], [659, 1], [523, 1], [392, 1], [523, 2], [0, 1]]
    ]
  }
};
let musicOn = false, musicTimer = null;
function curStyle() { return MUSIC[settings.music] || MUSIC.bouncy; }
function playStep(tune, i, st) {
  if (!musicOn) return;
  const [f, b] = tune[i % tune.length];
  if (f > 0) {
    tone(f, 0, st.beat * b * 0.00085, st.wave, .06);
    if (st.bass && i % 2 === 0) tone(f / 2, 0, st.beat * b * 0.0006, "sine", .05);
  }
  const atEnd = i % tune.length === tune.length - 1;
  if (atEnd && st.boing && Math.random() < .35) tone(rand([180, 200, 240]), st.beat * b * 0.0004, .18, "sawtooth", .05);
  const nextTune = atEnd && Math.random() < .4 ? rand(st.tunes) : tune;
  musicTimer = core.wait(() => playStep(nextTune, i + 1, st), st.beat * b);
}
function startMusic() { audio(); musicOn = true; $("musicBtn").classList.add("on"); const st = curStyle(); playStep(rand(st.tunes), 0, st); }
function stopMusic() { musicOn = false; if (musicTimer) { clearTimeout(musicTimer); core.timers.delete(musicTimer); } $("musicBtn").classList.remove("on"); }
function toggleMusic() { if (musicOn) stopMusic(); else startMusic(); }

/* ================= Fireworks + floaters ================= */
let fxRaf = null;
function fireworks() {
  const c = $("fxC"), ctx = c.getContext("2d");
  c.width = innerWidth; c.height = innerHeight;
  const parts = [];
  const burst = (x, y) => {
    const hue = Math.random() * 360;
    for (let i = 0; i < 55; i++) {
      const a = Math.random() * Math.PI * 2, v = randBetween(1.5, 7);
      parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
                   life: randBetween(45, 80), hue: hue + randBetween(-20, 20), r: randBetween(2, 4.5) });
    }
  };
  for (let i = 0; i < 4; i++)
    setTimeout(() => burst(randBetween(.2, .8) * c.width, randBetween(.15, .5) * c.height), i * 420);
  if (fxRaf) cancelAnimationFrame(fxRaf);
  const start = performance.now();
  const frame = () => {
    ctx.clearRect(0, 0, c.width, c.height);
    for (const p of parts) {
      if (p.life <= 0) continue;
      p.x += p.vx; p.y += p.vy; p.vy += .07; p.vx *= .985; p.life--;
      ctx.globalAlpha = Math.min(1, p.life / 35);
      ctx.fillStyle = `hsl(${p.hue}, 95%, 62%)`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (performance.now() - start < 3400) fxRaf = requestAnimationFrame(frame);
    else { ctx.clearRect(0, 0, c.width, c.height); fxRaf = null; }
  };
  fxRaf = requestAnimationFrame(frame);
}
function floaters(emojis, x, y, n = 8) {
  for (let i = 0; i < n; i++) {
    const f = document.createElement("div");
    f.className = "floater"; f.textContent = rand(emojis);
    f.style.left = (x + randBetween(-60, 60)) + "px";
    f.style.top = (y + randBetween(-20, 20)) + "px";
    f.style.animationDelay = (i * 0.05) + "s";
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1500);
  }
}

/* ===== Pointer sparkle trail — self-fading glitter behind fingers (paint + tracing) ===== */
const trail = {
  parts: [], raf: null, ctx: null, w: 0, h: 0,
  ensure() {
    const c = $("trailC");
    if (this.w !== innerWidth || this.h !== innerHeight) { this.w = c.width = innerWidth; this.h = c.height = innerHeight; this.ctx = c.getContext("2d"); }
    else if (!this.ctx) this.ctx = c.getContext("2d");
  },
  add(x, y, hue, n = 3) {
    this.ensure();
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, sp = randBetween(.3, 2.1);
      this.parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - .55,
        life: 1, decay: randBetween(.018, .04), r: randBetween(2.5, 6),
        hue: hue + randBetween(-18, 18), star: Math.random() < .45, spin: randBetween(-.22, .22), ang: Math.random() * 7 });
    }
    if (this.parts.length > 260) this.parts.splice(0, this.parts.length - 260);   // cap for low-end phones
    if (!this.raf) this.raf = requestAnimationFrame(() => this.frame());
  },
  frame() {
    const ctx = this.ctx; ctx.clearRect(0, 0, this.w, this.h);
    for (const p of this.parts) { p.x += p.vx; p.y += p.vy; p.vy += .04; p.vx *= .97; p.life -= p.decay; p.ang += p.spin; }
    this.parts = this.parts.filter(p => p.life > 0);
    for (const p of this.parts) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = `hsl(${p.hue}, 95%, 65%)`;
      if (p.star) {
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.ang); ctx.beginPath();
        for (let i = 0; i < 10; i++) { const rr = i % 2 ? p.r * .45 : p.r * 1.25, aa = i / 10 * Math.PI * 2, X = Math.cos(aa) * rr, Y = Math.sin(aa) * rr; i ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y); }
        ctx.closePath(); ctx.fill(); ctx.restore();
      } else { ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (.6 + p.life * .6), 0, 7); ctx.fill(); }
    }
    ctx.globalAlpha = 1;
    if (this.parts.length) this.raf = requestAnimationFrame(() => this.frame());
    else { ctx.clearRect(0, 0, this.w, this.h); this.raf = null; }
  }
};

function wiggle(el) { el.classList.remove("shake"); void el.offsetWidth; el.classList.add("shake"); }

function makeDraggable(el, onRelease) {
  el.style.touchAction = "none";
  el.addEventListener("pointerdown", e => {
    if (state.busy || el.classList.contains("on-plate")) return;
    e.preventDefault();
    try { el.setPointerCapture(e.pointerId); } catch (_) {}
    const r = el.getBoundingClientRect();
    const offX = e.clientX - r.left, offY = e.clientY - r.top;
    const startX = e.clientX, startY = e.clientY;
    const orig = { pos: el.style.position, left: el.style.left, top: el.style.top, z: el.style.zIndex };
    let moved = false;
    const move = ev => {
      if (Math.hypot(ev.clientX - startX, ev.clientY - startY) > 7) moved = true;
      el.style.position = "fixed"; el.style.zIndex = 60;
      el.style.left = (ev.clientX - offX) + "px";
      el.style.top = (ev.clientY - offY) + "px";
    };
    const up = ev => {
      el.removeEventListener("pointermove", move);
      el.removeEventListener("pointerup", up);
      el.removeEventListener("pointercancel", up);
      onRelease(el, ev, {
        moved,
        reset() { el.style.position = orig.pos; el.style.left = orig.left; el.style.top = orig.top; el.style.zIndex = orig.z; }
      });
    };
    el.addEventListener("pointermove", move);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
  });
}
const centerOf = el => { const r = el.getBoundingClientRect(); return { x: r.left + r.width / 2, y: r.top + r.height / 2 }; };
const inside = (pt, el) => { const r = el.getBoundingClientRect(); return pt.x > r.left && pt.x < r.right && pt.y > r.top && pt.y < r.bottom; };

/* grid scatter (up to 12) so items never overlap */
function scatter(n) {
  const cols = 4, rows = 3;
  return shuffle([...Array(cols * rows).keys()]).slice(0, n).map(cell => {
    const c = cell % cols, r = Math.floor(cell / cols);
    return { left: (5 + c * 23 + Math.random() * 7) + "%", top: (6 + r * 30 + Math.random() * 7) + "%" };
  });
}

/* ================= Round / level flow ================= */
function cleanupLevel() { core.cleanup(); }
function roundComplete() {
  state.busy = true;
  const manyMistakes = roundMistakes >= 3;
  recordRoundPerf(state.level, roundMistakes);
  let nextTier = tierFor(state.level);
  if (settings.diff === "auto" && manyMistakes) nextTier = Math.max(0, nextTier - 1);
  roundMistakes = 0;
  sfx.good();
  waitSpeech(() => {                       // let the praise finish talking first
    state.round++;
    state.tier = nextTier;
    drawProgress();
    if (state.round >= totalRounds()) levelComplete();
    else { state.busy = false; LEVELS[state.level].startRound(); }
  });
}
function levelComplete() { core.cleanup(); celebrateWith(state.level); }
function celebrateWith(levelId, opts = {}) {
  completions[levelId] = (completions[levelId] || 0) + 1;
  saveCompletions();
  const sticker = rand(STICKER_POOL);
  stickers.push({ e: sticker });           // position assigned by the sticker book's grid
  saveStickers();
  sparks = Math.min(QUEST_GOAL, sparks + 1); saveQuest();   // every win powers up the rocket

    : `⚡ Star Spark collected! ${left} more to fix the rocket 🚀`;

function renderQuest() {
  const slots = $("questSlots"); if (!slots) return;

    for (const p of this.pts) {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.hit ? 9 : 6, 0, Math.PI * 2);
      ctx.fillStyle = p.hit ? "#ffd23e" : "rgba(255,255,255,.85)";
      if (p.hit) { ctx.shadowColor = "#ffd23e"; ctx.shadowBlur = 12; } else ctx.shadowBlur = 0;
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  },
  paint(p) {
    if (this.done || state.busy || !this.last) return;
    const ctx = $("inkC").getContext("2d");
    ctx.lineCap = ctx.lineJoin = "round"; ctx.lineWidth = 13;
    ctx.strokeStyle = `hsl(${this.hue}, 90%, 62%)`; this.hue = (this.hue + 5) % 360;
    ctx.beginPath(); ctx.moveTo(this.last.x, this.last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
    let newHits = false;
    for (const pt of this.pts) {
      if (!pt.hit && Math.hypot(pt.x - p.x, pt.y - p.y) < 38) { pt.hit = true; this.hits++; newHits = true; if (this.hits % 4 === 0) sfx.tick(); }
    }
    if (newHits) {
      this.drawGuide();
      if (this.hits / this.pts.length >= 0.82) {
        this.done = true; this.pts.forEach(pt => pt.hit = true); this.drawGuide(); confetti(14);
        sfx.good();
        const ir = $("inkC").getBoundingClientRect(); floaters(["✨", "🌟", "💫"], ir.left + p.x, ir.top + p.y, 7);
        speak(`You traced it! ${praise()}`); roundComplete();
      }
    }
  }
};

const memoryLevel = {
  theme: "theme-memory", rounds: 3,
  startRound() {
    const pairs = [3, 4, 6][state.tier];
    this.remaining = pairs; this.first = null; this.locked = false;
    const themeName = rand(Object.keys(MEM_THEMES));
    setInstruction(`🃏 Find the matching pairs!`, `Find the matching ${themeName}! Tap a card to flip it!`);
    const picks = shuffle(MEM_THEMES[themeName]).slice(0, pairs);
    const deck = shuffle([...picks, ...picks]);
    const total = deck.length;
    const cols = total <= 6 ? 3 : 4;
    const rows = Math.ceil(total / cols);
    $("playArea").innerHTML = `<div class="mem-grid" id="memGrid"></div>`;
    const grid = $("memGrid");
    // size the cards from the ACTUAL play area so every card always fits on screen
    const pa = $("playArea").getBoundingClientRect();
    const gap = Math.max(8, Math.min(pa.width, pa.height) * 0.025);
    const availW = pa.width - 16, availH = pa.height - 16;
    let cw = (availW - (cols + 1) * gap) / cols;
    let ch = (availH - (rows + 1) * gap) / rows;
    let size = Math.min(cw, ch / 1.22);        // cards are a bit taller than wide
    size = Math.max(44, Math.min(size, 120));
    grid.style.display = "grid";
    grid.style.gridTemplateColumns = `repeat(${cols}, ${size}px)`;
    grid.style.gap = gap + "px";
    grid.style.maxWidth = "100%";
    deck.forEach(([emoji, word]) => {
      const card = document.createElement("button");
      card.className = "mem-card";
      card.style.width = size + "px";
      card.style.height = (size * 1.22) + "px";
      card.dataset.emoji = emoji; card.dataset.word = word;
      card.innerHTML = `<div class="mem-inner"><div class="mem-face front">⭐</div><div class="mem-face back">${emoji}</div></div>`;
      card.onclick = () => this.flip(card);
      grid.appendChild(card);
    });
  },
  flip(card) {
    if (state.busy || this.locked) return;
    if (card.classList.contains("flipped") || card.classList.contains("matched")) return;
    sfx.tick(); card.classList.add("flipped");
    if (!this.first) { this.first = card; return; }
    const a = this.first, b = card; this.first = null;
    if (a.dataset.emoji === b.dataset.emoji) {
      this.locked = true;
      core.wait(() => {
        a.classList.add("matched"); b.classList.add("matched");
        a.classList.remove("flipped"); b.classList.remove("flipped");
        sfx.good(); this.locked = false; this.remaining--;
        if (this.remaining > 0) speak(`A match! Two ${plural(a.dataset.word, 2)}!`);
        else { speak(`You found them all! ${praise()}`); roundComplete(); }
      }, 550);
    } else {
      this.locked = true; sfx.bad();
      core.wait(() => { a.classList.remove("flipped"); b.classList.remove("flipped"); this.locked = false; }, 1000);
    }
  }
};

  storyPage = 0;
  renderStory();

function renderStory() {
  const p = STORY[storyPage];

  document.body.className = p.theme;
  const scene = $("storyScene");
  scene.className = "story-scene";
  
  // split art into interactive emojis

  scene.innerHTML = `<div class="story-art">${artHtml}</div>

      <div class="story-tap-hint">👆 Tap the picture!</div>`;
  
  $("storyDots").innerHTML = STORY.map((_, i) => `<div class="sdot ${i === storyPage ? "on" : ""}"></div>`).join("");

  const p = STORY[storyPage];

  btn.textContent = p.last ? "🎉" : "▶️";
  btn.style.opacity = storySolved ? "1" : "0.3";
  btn.style.pointerEvents = storySolved ? "auto" : "none";

function storyTap(e, ev) {

  { id: "ocean",  name: "Ocean 🌊",  cls: "sc-ocean",  deco: "🐚 🪸 🌊 🐚 🌊" },
  { id: "castle", name: "Castle 🏰", cls: "sc-castle", deco: "🌸 🏰 🌳 🌸" },
  { id: "bed",    name: "Cozy 🌙",   cls: "sc-bed",    deco: "🛏️ 🧸 🪟 🌙" }
];
let decor = JSON.parse(localStorage.getItem("fionaDecor") || "{}");
let curScene = localStorage.getItem("fionaScene") || "park";
let palSel = null;
const saveDecor = () => localStorage.setItem("fionaDecor", JSON.stringify(decor));

function showStickerBook() {
  cleanupLevel();
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  document.body.className = "";
  hideAllScreens();
  $("stickerbook").classList.remove("hidden");
  // scene buttons
  const sb = $("sceneBtns"); sb.innerHTML = "";
  SCENES.forEach(sc => {
    const b = document.createElement("button");
    b.className = "scene-btn" + (sc.id === curScene ? " sel" : "");
    b.textContent = sc.name;
    b.onclick = () => { curScene = sc.id; localStorage.setItem("fionaScene", curScene); palSel = null; showStickerBook(); };
    sb.appendChild(b);
  });
  renderScene();
  // palette of earned sticker types
  const earned = [...new Set(stickers.map(s => s.e))];
  const pal = $("stickerPalette"); pal.innerHTML = "";
  if (!earned.length) {
    $("stickerHint").textContent = "Play games to earn stickers to decorate with!";
    speak("Play games to earn stickers!");
    return;
  }
  $("stickerHint").textContent = "Tap a sticker, then tap the picture to place it! 🎨";
  speak(`Here is your sticker book, ${NAME}! Tap a sticker, then tap the picture to place it!`);
  earned.forEach(e => {
    const b = document.createElement("button");
    b.className = "pal-item" + (e === palSel ? " sel" : "");
    b.textContent = e;
    b.onclick = () => { palSel = (palSel === e ? null : e); sfx.tick(); document.querySelectorAll(".pal-item").forEach(x => x.classList.toggle("sel", x.textContent === palSel)); };
    pal.appendChild(b);
  });
}
function renderScene() {
  const sc = SCENES.find(s => s.id === curScene) || SCENES[0];
  const scene = $("stickerScene");
  scene.className = sc.cls;
  scene.innerHTML = `<div class="scene-deco">${sc.deco}</div>`;
  scene.onpointerdown = e => {
    if (!palSel || e.target !== scene && e.target.className !== "scene-deco") return;
    const r = scene.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width * 100, y = (e.clientY - r.top) / r.height * 100;
    (decor[curScene] = decor[curScene] || []).push({ e: palSel, x, y });
    saveDecor(); sfx.tap();
    const d = STICKER_DATA[palSel];
    if (d && d.h === curScene) {
      confetti();
      speak(`Perfect! The ${d.n} belongs in the ${curScene}!`);
    }
    addPlaced({ e: palSel, x, y }, decor[curScene].length - 1);
  };
  (decor[curScene] || []).forEach((d, i) => addPlaced(d, i));
}
function addPlaced(d, idx) {
  const scene = $("stickerScene");
  const el = document.createElement("div");
  el.className = "sticker"; el.textContent = d.e;
  el.style.left = d.x + "%"; el.style.top = d.y + "%";
  el.addEventListener("pointerdown", e => {
    e.preventDefault(); e.stopPropagation();
    try { el.setPointerCapture(e.pointerId); } catch (_) {}
    el.classList.remove("settle"); el.classList.add("lifted");   // pick it up: enlarge, tilt, cast shadow
    sfx.tick();
    let moved = false; const sx = e.clientX, sy = e.clientY;
    const pct = ev => { const r = scene.getBoundingClientRect(); return { x: clamp((ev.clientX - r.left) / r.width * 100, 1, 99), y: clamp((ev.clientY - r.top) / r.height * 100, 1, 99) }; };
    const move = ev => {
      if (Math.hypot(ev.clientX - sx, ev.clientY - sy) > 6) moved = true;
      const q = pct(ev); el.style.left = q.x + "%"; el.style.top = q.y + "%";
      d.x = q.x; d.y = q.y;
    };
    const up = () => {
      el.removeEventListener("pointermove", move); el.removeEventListener("pointerup", up);
      el.classList.remove("lifted"); el.classList.add("settle");   // drop it: physical settlement bounce
      el.addEventListener("animationend", () => el.classList.remove("settle"), { once: true });
      sfx.tap(); saveDecor();
    };
    el.addEventListener("pointermove", move); el.addEventListener("pointerup", up);
  });
  scene.appendChild(el);
}

/* ================= Settings ================= */
function openSettings() {
  $("charscreen").classList.add("hidden"); $("namescreen").classList.add("hidden");
  $("settings").classList.remove("hidden");
  document.querySelectorAll("#segDiff button").forEach(b => b.classList.toggle("sel", b.dataset.d === settings.diff));
  document.querySelectorAll("#segVoice button").forEach(b => b.classList.toggle("sel", String(settings.voice) === b.dataset.v));
  document.querySelectorAll("#segMusic button").forEach(b => b.classList.toggle("sel", b.dataset.m === settings.music));
}
function showCharScreen(returnTo) {
  hideAllScreens();
  $("charscreen").classList.remove("hidden");
  $("charDone").dataset.return = returnTo || "hub";
  const grid = $("charGrid"); grid.innerHTML = "";
  BUDDIES.forEach(b => {
    const btn = document.createElement("button");
    btn.className = "char-btn" + (b.id === BUDDY ? " sel" : "");
    btn.innerHTML = `<span class="ch-e">${b.e}</span><span class="ch-n">${b.name}</span>`;
    btn.onclick = () => {
      BUDDY = b.id; localStorage.setItem("fionaBuddy", BUDDY); localStorage.setItem("fionaBuddySet", "1");
      refreshBuddies(); sfx.tap(); speak(b.name + "!");
      grid.querySelectorAll(".char-btn").forEach(x => x.classList.remove("sel")); btn.classList.add("sel");
      clearTimeout(charTimer);                       // tapping a buddy auto-advances (no need to find the button)
      charTimer = setTimeout(() => { $("charDone").dataset.return === "settings" ? openSettings() : showHub(); }, 800);
    };
    grid.appendChild(btn);
  });
}

/* ================= Navigation ================= */
const ALL_SCREENS = ["hub", "games", "game", "stickerbook", "story", "paint", "dressup", "dashboard", "namescreen", "charscreen", "settings", "celebrate"];
function hideAllScreens() { ALL_SCREENS.forEach(id => { const e = $(id); if (e) e.classList.add("hidden"); }); playWipe(); }
function playWipe() { const w = $("wipe"); if (!w) return; w.classList.remove("run"); void w.offsetWidth; w.classList.add("run"); }
// contextual screen entrance: "fwd" (drill in) or "back" (go home); falls back to default screenIn
function animScreen(id, cls) { const el = $(id); if (!el) return; el.classList.remove("fwd", "back"); void el.offsetWidth; el.classList.add(cls); }
function showHub() {
  cleanupLevel();
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  setMascots("talking", false);
  document.body.className = "";
  hideAllScreens();
  $("hub").classList.remove("hidden");
  animScreen("hub", "back");
  buildHub();
  if (!questGreeted && settings.voice) { questGreeted = true; core.wait(questIntro, 800); }
}
function startLevel(name) {
  audio(); cleanupLevel();
  state.level = name; state.round = 0; state.busy = false; state.tier = tierFor(name);
  roundMistakes = 0;
  document.body.className = LEVELS[name].theme;
  hideAllScreens();
  $("game").classList.remove("hidden");
  animScreen("game", "fwd");
  drawProgress();
  LEVELS[name].startRound();
}
function showDashboard() {
  cleanupLevel();
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  document.body.className = "";
  hideAllScreens();
  $("dashboard").classList.remove("hidden");
  const plays = id => completions[id] || 0;
  const totalPlays = Object.values(completions).reduce((a, b) => a + b, 0);
  const totalStars = Object.keys(completions).reduce((a, k) => a + Math.min(3, completions[k]), 0);
  const gamesTried = Object.keys(completions).filter(k => completions[k] > 0).length;
  $("dashStats").innerHTML =
    `<div class="stat"><div class="sv">⭐ ${totalStars}</div><div class="sl">Stars</div></div>
     <div class="stat"><div class="sv">🎮 ${totalPlays}</div><div class="sl">Games played</div></div>
     <div class="stat"><div class="sv">📒 ${stickers.length}</div><div class="sl">Stickers</div></div>
     <div class="stat"><div class="sv">🗂️ ${gamesTried}/${Object.keys(GAMES).length}</div><div class="sl">Activities tried</div></div>
     <div class="stat"><div class="sv">🚀 ${trips}</div><div class="sl">Rocket trips</div></div>
     <div class="stat"><div class="sv">⚡ ${sparks}/${QUEST_GOAL}</div><div class="sl">Star Sparks</div></div>`;
  const list = $("dashList"); list.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const rows = cat.games.map(gid => {
      const g = GAMES[gid], p = plays(gid);
      return `<div class="dash-row"><span class="dg">${g.icon} ${g.name}</span>
              <span class="dp">${p ? "⭐".repeat(Math.min(3, p)) + (p > 3 ? ` ×${p}` : "") : "—"}</span></div>`;
    }).join("");
    list.innerHTML += `<div class="dash-cat"><h3>${cat.icon} ${cat.name}</h3>${rows}</div>`;
  });
}

/* ================= Boot ================= */
refreshBuddies();
buildHub();
document.addEventListener("contextmenu", e => e.preventDefault());   // no right-click / long-press menus for little hands
$("homeBtn").onclick = showHub;
$("gamesHome").onclick = showHub;
$("celebHome").onclick = showHub;
$("celebBook").onclick = showStickerBook;
$("celebLaunch").onclick = rocketLaunch;
$("questBar").onclick = () => { sfx.tap(); questSpeak(); };
$("bookBtn").onclick = () => { audio(); showStickerBook(); };
$("bookHome").onclick = showHub;
$("musicBtn").onclick = toggleMusic;
$("speakBtn").onclick = () => speak($("instruction").dataset.spoken || $("instruction").textContent);
$("settingsBtn").onclick = openSettings;
$("setDone").onclick = () => { $("settings").classList.add("hidden"); };
$("setReset").onclick = () => {
  if (confirm("Reset all of " + NAME + "'s stars and stickers?")) {
    for (const k in completions) delete completions[k];
    stickers.length = 0; sparks = 0; trips = 0; questShown = 0;
    saveCompletions(); saveStickers(); saveQuest(); buildHub();
  }
};
$("setName").onclick = () => { $("settings").classList.add("hidden"); showNameScreen(NAME); };
document.querySelectorAll("#segDiff button").forEach(b => b.onclick = () => { settings.diff = b.dataset.d; saveSettings(); openSettings(); });
document.querySelectorAll("#segVoice button").forEach(b => b.onclick = () => { settings.voice = +b.dataset.v; saveSettings(); openSettings(); });
document.querySelectorAll("#segMusic button").forEach(b => b.onclick = () => {
  settings.music = b.dataset.m; saveSettings();
  if (settings.music === "off") stopMusic(); else { stopMusic(); startMusic(); }
  openSettings();
});
$("setBuddy").onclick = () => { $("settings").classList.add("hidden"); showCharScreen("settings"); };
$("charDone").onclick = () => { clearTimeout(charTimer); $("charDone").dataset.return === "settings" ? openSettings() : showHub(); };
$("storyHome").onclick = showHub;
$("storyPrev").onclick = () => storyNav(-1);
$("storyNext").onclick = () => storyNav(1);
$("storyRead").onclick = () => speak(fillName(STORY[storyPage].text));
$("paintHome").onclick = showHub;
$("paintStamp").onclick = () => {
  if (paint.mode !== "stamp") paint.mode = "stamp";
  else paint.stampIdx = (paint.stampIdx + 1) % paint.stamps.length;
  $("paintStamp").textContent = paint.stamps[paint.stampIdx];
  $("paintStamp").classList.add("on"); $("paintErase").classList.remove("on");
};
$("paintErase").onclick = () => { paint.mode = "erase"; $("paintErase").classList.add("on"); $("paintStamp").classList.remove("on"); };
$("paintClear").onclick = () => paint.redraw();
$("paintDone").onclick = () => { celebrateWith("paint", { noLevelUp: true }); };

/* ---- dress-up ---- */
$("dressHome").onclick = showHub;
$("dressBg").onclick = () => dressup.cycleBg();
$("dressShuffle").onclick = () => dressup.shuffle();
$("dressDone").onclick = () => dressup.done();

/* ---- dashboard ---- */
$("dashHome").onclick = showHub;
$("setDash").onclick = () => { $("settings").classList.add("hidden"); showDashboard(); };

/* ---- sticker book clear ---- */
$("sceneClear").onclick = () => { if (decor[curScene] && decor[curScene].length) { decor[curScene] = []; saveDecor(); sfx.tick(); renderScene(); } };

/* ---- name entry ---- */
function showNameScreen(prefill) {
  $("nameMascot").innerHTML = buddyMarkup();
  $("nameInput").value = prefill || "";
  hideAllScreens();
  $("namescreen").classList.remove("hidden");
  setTimeout(() => { try { $("nameInput").focus(); } catch (_) {} }, 250);
}
function commitName() {
  audio();
  const v = $("nameInput").value.trim();
  NAME = v ? v.slice(0, 12) : "Explorer";
  localStorage.setItem("fionaName", NAME);
  localStorage.setItem("fionaNameSet", "1");
  applyName();
  $("namescreen").classList.add("hidden");
  if (settings.music !== "off" && !musicOn) startMusic();   // kick off the happy background tune
  speak(`Hi ${NAME}! Let's play!`);
  if (!localStorage.getItem("fionaBuddySet")) showCharScreen("hub");   // first run: pick a buddy next
  else showHub();
}
$("nameStart").onclick = commitName;
$("nameSkip").onclick = () => {
  NAME = $("nameInput").value.trim().slice(0, 12) || "Explorer";
  localStorage.setItem("fionaName", NAME); localStorage.setItem("fionaNameSet", "1");
  applyName(); $("namescreen").classList.add("hidden");
  if (settings.music !== "off" && !musicOn) startMusic();
  if (!localStorage.getItem("fionaBuddySet")) showCharScreen("hub"); else showHub();
};
$("nameInput").addEventListener("keydown", e => { if (e.key === "Enter") commitName(); });

applyName();
if (!localStorage.getItem("fionaNameSet")) showNameScreen("");
else showHub();

if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
