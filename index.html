<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#8fd5f7">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>{n}'s World</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  html, body { height:100%; overflow:hidden; }
  body {
    font-family:"Comic Sans MS","Segoe UI",system-ui,sans-serif;
    background:linear-gradient(#8fd5f7, #c9efb0 65%, #8fd06a);
    transition:background .5s;
  }
  body.theme-snow   { background:linear-gradient(#1d3f8f, #4f8fd8 60%, #cfeaff); }
  body.theme-ocean  { background:linear-gradient(#8fdcf0, #2fa7c9 55%, #0e6e96); }
  body.theme-pizza  { background:linear-gradient(#ffd98a, #ffb35c 60%, #e8843c); }
  body.theme-bike   { background:linear-gradient(#9bdcf7, #cdeefb 45%, #a8e08c 70%, #79c861); }
  body.theme-pasta  { background:repeating-conic-gradient(#f3ece0 0% 25%, #e25b4a 0% 50%) 0 0 / 16vmin 16vmin; }
  body.theme-trace  { background:linear-gradient(#4d3390, #8a5fc9 55%, #c9aef0); }
  body.theme-memory { background:linear-gradient(#f7c948, #f08a4b 60%, #d9663a); }
  body.theme-music  { background:linear-gradient(#3b2a6e, #7a4fb8 55%, #c86bb1); }
  body.theme-whosays{ background:linear-gradient(#2f9e6e, #57c98a 55%, #bdeccf); }
  body.theme-story  { background:linear-gradient(#244b8f, #6f8fd0 60%, #f0d6a8); }
  body.theme-space  { background:linear-gradient(#070726, #181848 50%, #34215c); }

  .screen { position:absolute; inset:0; display:flex; flex-direction:column;
            align-items:center; justify-content:center; padding:2vmin; animation:fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity:0; transform:scale(.985);} to { opacity:1; transform:scale(1);} }
  .hidden { display:none !important; }
  button { font-family:inherit; cursor:pointer; }

  /* ================= WORLD MAP HUB ================= */
  #hub { padding:0; overflow:hidden; }
  #hub h1 {
    position:absolute; top:1.2vmin; width:100%; text-align:center; z-index:5;
    font-size:clamp(22px, 5vmin, 46px); color:#fff;
    text-shadow:0 3px 0 rgba(0,0,0,.25); pointer-events:none;
  }
  #map { position:relative; width:100%; height:100%; }
  #mapBg { position:absolute; inset:0; width:100%; height:100%; }
  .sun { position:absolute; top:1.5vmin; right:13vmin; font-size:clamp(34px,7.5vmin,68px);
         animation:spin 24s linear infinite; z-index:1; pointer-events:none; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .cloud { position:absolute; font-size:clamp(28px,6.5vmin,58px); opacity:.95; z-index:1;
           left:-15vw; animation:drift linear infinite; pointer-events:none; }
  @keyframes drift { to { transform:translateX(130vw); } }

  .map-node { position:absolute; transform:translate(-50%,-50%); z-index:4;
              display:flex; flex-direction:column; align-items:center; gap:.3vmin;
              border:none; background:none; }
  .map-node .bubble {
    width:clamp(50px,11vmin,90px); height:clamp(50px,11vmin,90px); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(23px,5.4vmin,46px); border:4px solid #fff;
    box-shadow:0 5px 0 rgba(0,0,0,.22), inset 0 -6px 0 rgba(0,0,0,.14);
    transition:transform .12s;
  }
  .map-node:active .bubble { transform:scale(.9); }
  .map-node .nname { font-size:clamp(10px,2vmin,16px); font-weight:bold; color:#fff;
    text-shadow:0 1px 0 rgba(0,0,0,.4); background:rgba(0,0,0,.22); padding:.1em .7em; border-radius:99px; white-space:nowrap; }
  .map-node .nstars { font-size:clamp(9px,1.8vmin,14px); min-height:1.1em; letter-spacing:-1px; }
  .b-snow   { background:linear-gradient(#7fb6f7,#3a6fd0); }
  .b-ocean  { background:linear-gradient(#4fc4e0,#1583ad); }
  .b-memory { background:linear-gradient(#ffd166,#e8913a); }
  .b-bike   { background:linear-gradient(#8fd96a,#4a9e35); }
  .b-music  { background:linear-gradient(#c77ff2,#8246c8); }
  .b-whosays{ background:linear-gradient(#5ad29a,#2f9e6e); }
  .b-pizza  { background:linear-gradient(#ffb04f,#e0701e); }
  .b-pasta  { background:linear-gradient(#f08a6a,#cf4530); }
  .b-trace  { background:linear-gradient(#b07fe8,#7444c4); }
  .b-paint  { background:linear-gradient(#ff8fb1,#e84393); }
  .b-story  { background:linear-gradient(#6f8fd0,#34508f); }
  .b-rocket { background:linear-gradient(#5a6bd8,#2a2f7a); }
  .b-sort   { background:linear-gradient(#7a5fd0,#3a2a7a); }
  .b-pattern{ background:linear-gradient(#9b6fe0,#5a3aa0); }
  .c-num    { background:linear-gradient(#7fb6f7,#3a6fd0); }
  .c-shape  { background:linear-gradient(#ff9f4f,#e0701e); }
  .c-brain  { background:linear-gradient(#5ad29a,#2f9e6e); }
  .c-animal { background:linear-gradient(#ffd166,#e8913a); }
  .c-space  { background:linear-gradient(#5a6bd8,#26265a); }
  .c-create { background:linear-gradient(#ff8fb1,#e84393); }

  /* category + game grids */
  #mapNodes.cats { position:absolute; inset:0; display:grid; grid-template-columns:repeat(3,1fr);
                   align-content:center; justify-items:center; gap:2.5vmin 1vmin; padding:11vmin 3vmin 9vmin; z-index:4; }
  @media (max-width:560px) { #mapNodes.cats { grid-template-columns:repeat(2,1fr); } }
  .cat-node { position:static; transform:none; animation:nodePop .4s ease backwards; }
  .cat-node:active .bubble { transform:scale(.9); }
  .cat-node .bubble { width:clamp(62px,15vmin,116px); height:clamp(62px,15vmin,116px); font-size:clamp(30px,8vmin,58px); }
  @keyframes nodePop { 0%{opacity:0; transform:scale(.4);} 100%{opacity:1; transform:scale(1);} }
  #games { padding-top:9vmin; }
  #games #gamesHome { position:absolute; top:2vmin; left:2vmin; z-index:10; }
  #gamesTitle { position:absolute; top:2.5vmin; width:100%; text-align:center; color:#fff;
                font-size:clamp(22px,5vmin,40px); text-shadow:0 3px 0 rgba(0,0,0,.25); pointer-events:none; }
  #gameNodes { display:grid; grid-template-columns:repeat(2,1fr); gap:3vmin 4vmin;
               align-content:center; justify-items:center; padding:2vmin; max-width:640px; }
  @media (min-width:680px) { #gameNodes { grid-template-columns:repeat(3,1fr); } }
  #gameNodes .cat-node .bubble { width:clamp(70px,17vmin,120px); height:clamp(70px,17vmin,120px); font-size:clamp(34px,9vmin,62px); }

  /* name entry */
  #namescreen { background:linear-gradient(#8fd5f7,#c9efb0 70%,#8fd06a); z-index:78; }
  .name-card { background:#fff; border-radius:30px; padding:4vmin 5vmin; display:flex; flex-direction:column;
               align-items:center; gap:2.2vmin; box-shadow:0 8px 0 rgba(0,0,0,.2); max-width:92%; }
  .name-card .mascot { width:clamp(80px,18vmin,150px); }
  .name-card h2 { font-size:clamp(20px,4.6vmin,34px); color:#444; text-align:center; }
  #nameInput { font-family:inherit; font-size:clamp(20px,5vmin,32px); text-align:center; padding:1.6vmin 3vmin;
               border:3px solid #c9aef0; border-radius:18px; width:min(78vw,420px); color:#333; }
  #nameInput:focus { outline:none; border-color:#7444c4; }
  #nameStart { border:none; border-radius:20px; padding:2vmin 5vmin; font-family:inherit;
               font-size:clamp(18px,4vmin,28px); font-weight:bold; background:#ffd23e; color:#5b3c00; box-shadow:0 5px 0 rgba(0,0,0,.22); }
  #nameStart:active { transform:scale(.95); }
  #nameSkip { border:none; background:none; color:#aaa; font-family:inherit; font-size:clamp(13px,2.8vmin,18px); text-decoration:underline; }
  #setName { background:#cdeafe; color:#1b4e7a; }

  /* buddy chooser */
  #charscreen { background:linear-gradient(#b8a0ee,#c9efb0 75%,#8fd06a); z-index:78; }
  .char-card { background:#fff; border-radius:30px; padding:3.5vmin 4vmin; display:flex; flex-direction:column;
               align-items:center; gap:2.4vmin; box-shadow:0 8px 0 rgba(0,0,0,.2); max-width:94%; }
  .char-card h2 { font-size:clamp(20px,4.6vmin,34px); color:#444; text-align:center; }
  .char-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2vmin; }
  @media (max-width:420px) { .char-grid { grid-template-columns:repeat(2,1fr); } }
  .char-btn { border:none; background:#f4f0fc; border-radius:20px; padding:1.6vmin 1vmin; display:flex;
              flex-direction:column; align-items:center; gap:.4vmin; box-shadow:0 4px 0 rgba(0,0,0,.12); }
  .char-btn:active { transform:scale(.92); }
  .char-btn.sel { background:#ffd23e; outline:4px solid #f0a813; }
  .char-btn .ch-e { font-size:clamp(34px,8vmin,58px); line-height:1; }
  .char-btn .ch-n { font-size:clamp(12px,2.6vmin,18px); font-weight:bold; color:#555; }
  #charDone { border:none; border-radius:20px; padding:1.8vmin 5vmin; font-family:inherit;
              font-size:clamp(18px,4vmin,28px); font-weight:bold; background:#ffd23e; color:#5b3c00; box-shadow:0 5px 0 rgba(0,0,0,.22); }
  #charDone:active { transform:scale(.95); }
  #setBuddy { background:#e7dcff; color:#5a3aa0; }

  .corner-btn { position:absolute; z-index:6; border:none; border-radius:50%;
    width:clamp(44px,9vmin,66px); height:clamp(44px,9vmin,66px); font-size:clamp(20px,4.4vmin,32px);
    background:#fff; box-shadow:0 4px 0 rgba(0,0,0,.2); }
  .corner-btn:active { transform:scale(.92); }
  #bookBtn { top:1.4vmin; right:1.4vmin; }
  #settingsBtn { bottom:1.4vmin; left:1.4vmin; opacity:.85; }

  /* ================= MASCOT ================= */
  .mascot { pointer-events:none; animation:mbob 3s ease-in-out infinite; }
  .mascot svg { width:100%; height:auto; filter:drop-shadow(0 4px 4px rgba(0,0,0,.25)); }
  @keyframes mbob  { 50% { transform:translateY(-1vmin); } }
  .mascot.talking   { animation:mtalk .38s ease-in-out infinite; }
  @keyframes mtalk { 50% { transform:translateY(-.7vmin) rotate(2deg); } }
  .mascot.celebrate { animation:mjump .55s ease-in-out infinite; }
  @keyframes mjump { 50% { transform:translateY(-3vmin) rotate(-3deg); } }
  .mascot .eyes { transform-box:fill-box; transform-origin:center; animation:blink 4.2s infinite; }
  @keyframes blink { 0%,93%,100% { transform:scaleY(1);} 95.5% { transform:scaleY(.1);} }
  .mascot .armR { transform-box:fill-box; transform-origin:0% 100%; animation:wave 3.4s ease-in-out infinite; }
  @keyframes wave { 0%,68%,100% { transform:rotate(0);} 78% { transform:rotate(-24deg);} 88% { transform:rotate(6deg);} }
  #hubMascot   { position:absolute; left:1%; bottom:3%; width:clamp(74px,15vmin,140px); font-size:clamp(64px,13vmin,124px); z-index:4; }
  #gameMascot  { position:fixed; left:1vmin; bottom:1vmin; width:clamp(58px,11.5vmin,100px); font-size:clamp(50px,10vmin,90px); z-index:30; }
  #celebMascot { width:clamp(95px,21vmin,180px); font-size:clamp(84px,19vmin,164px); }
  .mascot .buddy { display:block; line-height:1; text-align:center; filter:drop-shadow(0 4px 4px rgba(0,0,0,.25)); }

  /* ================= GAME ================= */
  #game header {
    display:flex; align-items:center; gap:1.6vmin; width:100%; max-width:980px;
    padding:1vmin 1.6vmin; z-index:20;
  }
  .round-btn {
    border:none; border-radius:50%; width:clamp(48px, 9vmin, 72px); height:clamp(48px, 9vmin, 72px);
    font-size:clamp(22px, 4.5vmin, 34px); background:#fff; box-shadow:0 4px 0 rgba(0,0,0,.2); flex-shrink:0;
  }
  .round-btn:active { transform:scale(.92); }
  #instruction {
    flex:1; background:rgba(255,255,255,.93); border-radius:20px; padding:1.4vmin 2.2vmin;
    font-size:clamp(16px, 3.6vmin, 28px); font-weight:bold; color:#333; text-align:center;
    min-height:2em; display:flex; align-items:center; justify-content:center;
  }
  #playArea { position:relative; flex:1; width:100%; max-width:980px; overflow:hidden; border-radius:14px; }
  #progress { display:flex; gap:1.5vmin; padding:1.6vmin; z-index:20; flex-wrap:wrap; justify-content:center; }
  #progress .dot {
    width:clamp(14px,3.2vmin,24px); height:clamp(14px,3.2vmin,24px); border-radius:50%;
    background:rgba(255,255,255,.45); border:2px solid #fff;
  }
  #progress .dot.done { background:#ffd23e; }

  /* ----- shared bits ----- */
  .popped { animation:pop .45s ease forwards !important; pointer-events:none !important; }
  @keyframes pop { 40%{transform:scale(1.6); opacity:1;} 100%{transform:scale(0); opacity:0;} }
  .shake { animation:shake .5s; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-10px) rotate(-4deg);} 75%{transform:translateX(10px) rotate(4deg);} }
  @keyframes floaty { 0%,100%{transform:translateY(0) rotate(-5deg);} 50%{transform:translateY(-2.2vmin) rotate(5deg);} }
  .mini-star { position:fixed; font-size:clamp(30px,7vmin,56px); z-index:90;
               animation:pop .9s ease forwards; pointer-events:none; }
  .confetto { position:fixed; top:-8vh; z-index:95; font-size:clamp(20px,5vmin,40px);
              animation:fall linear forwards; pointer-events:none; }
  @keyframes fall { to { transform:translateY(115vh) rotate(540deg); } }
  #fxC { position:fixed; inset:0; width:100vw; height:100vh; z-index:85; pointer-events:none; }
  .floater { position:fixed; z-index:88; font-size:clamp(26px,6vmin,48px); pointer-events:none;
             animation:floatUp 1.4s ease-out forwards; }
  @keyframes floatUp { to { transform:translateY(-26vh) rotate(18deg); opacity:0; } }

  /* ----- snow ----- */
  .snowflake {
    position:absolute; border:none; background:none; z-index:5;
    font-size:clamp(44px, 10vmin, 84px); line-height:1;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.3));
    animation:floaty 3s ease-in-out infinite;
  }
  .snowdust { position:absolute; top:-6vh; color:#fff; z-index:1; pointer-events:none;
              animation:snowfall linear infinite; }
  @keyframes snowfall { to { transform:translateY(110vh); } }
  .ice-spikes { position:absolute; bottom:0; left:0; width:100%; height:20%; z-index:0;
    background:rgba(255,255,255,.35); pointer-events:none;
    clip-path:polygon(0 100%,0 60%,6% 22%,12% 70%,18% 32%,24% 78%,30% 12%,36% 65%,44% 36%,50% 80%,56% 18%,62% 68%,70% 28%,76% 75%,82% 10%,88% 62%,94% 28%,100% 55%,100% 100%); }

  /* ----- ocean ----- */
  .fish-btn { position:absolute; border:none; background:none; z-index:5;
              animation:floaty 3.4s ease-in-out infinite; }
  .fish-btn svg { width:clamp(86px, 18vmin, 150px); height:auto;
                  filter:drop-shadow(0 3px 4px rgba(0,0,0,.3)); }
  .wave { position:absolute; bottom:-8%; width:200%; height:26%; border-radius:45%;
          background:rgba(255,255,255,.16); z-index:1; pointer-events:none;
          animation:waveShift ease-in-out infinite alternate; }
  @keyframes waveShift { from { transform:translateX(-22%);} to { transform:translateX(0);} }
  .bubble { position:absolute; bottom:-6vh; border-radius:50%; z-index:1; pointer-events:none;
            background:rgba(255,255,255,.35); animation:rise linear infinite; }
  @keyframes rise { to { transform:translateY(-115vh); } }

  /* ----- pizza / kitchen ----- */
  .pizza-wrap { position:absolute; inset:0; display:flex; flex-direction:column;
                align-items:center; justify-content:space-evenly; z-index:5; }
  .pizza-wrap svg.pizza { width:clamp(140px, 32vmin, 270px); height:auto;
                          filter:drop-shadow(0 5px 6px rgba(0,0,0,.25)); }
  #pizzaHolder { position:relative; }
  .laid-topping { position:absolute; transform:translate(-50%,-50%); z-index:6; pointer-events:none;
                  font-size:clamp(26px,6vmin,46px); animation:land .4s ease; }
  .choice-row { display:flex; gap:3vmin; flex-wrap:wrap; justify-content:center; }
  .choice {
    border:none; background:rgba(255,255,255,.95); border-radius:24px;
    padding:1.8vmin; box-shadow:0 6px 0 rgba(0,0,0,.2); touch-action:none;
    display:flex; align-items:center; justify-content:center;
  }
  .choice svg { display:block; width:clamp(58px, 13vmin, 110px); height:auto; pointer-events:none; }
  .choice.tok { font-size:clamp(34px,8vmin,64px); width:clamp(64px,14vmin,108px); height:clamp(64px,14vmin,108px); }
  .landed { animation:land .5s ease; }
  @keyframes land { 0%{transform:scale(2.2); opacity:0;} 100%{transform:scale(1); opacity:1;} }

  /* ----- bike ----- */
  .treeline { position:absolute; bottom:13%; width:100%; overflow:hidden; white-space:nowrap;
              font-size:clamp(34px,9vmin,68px); z-index:2; pointer-events:none; }
  .treeline.far { bottom:22%; font-size:clamp(20px,5vmin,38px); opacity:.6; }
  .marquee { display:inline-block; animation:scrollLeft linear infinite; }
  @keyframes scrollLeft { to { transform:translateX(-50%); } }
  .road { position:absolute; bottom:0; width:100%; height:14%; background:#5f6b78; z-index:1; }
  .road::after { content:""; position:absolute; top:45%; width:100%; height:8%;
    background:repeating-linear-gradient(90deg, #fff 0 42px, transparent 42px 100px);
    animation:roadmove .55s linear infinite; }
  @keyframes roadmove { to { background-position-x:-100px; } }
  .rider { position:absolute; left:5%; bottom:9%; z-index:6; pointer-events:none;
           font-size:clamp(58px,13vmin,110px); filter:drop-shadow(0 3px 3px rgba(0,0,0,.3));
           animation:ride .7s ease-in-out infinite; }
  @keyframes ride { 0%,100%{ transform:scaleX(-1) translateY(0);} 50%{ transform:scaleX(-1) translateY(-1vmin);} }
  .balloon { position:absolute; border:none; background:none; z-index:8; }
  .b-body {
    width:clamp(60px,13vmin,104px); height:clamp(72px,15.5vmin,124px); border-radius:50% 50% 50% 50% / 56% 56% 44% 44%;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:bold; font-size:clamp(28px,6.6vmin,52px); text-shadow:0 2px 0 rgba(0,0,0,.3);
    box-shadow:inset -6px -8px 0 rgba(0,0,0,.12), 0 3px 4px rgba(0,0,0,.25);
    animation:floaty 2.6s ease-in-out infinite;
  }
  .b-string { width:2px; height:clamp(26px,5.5vmin,44px); background:rgba(255,255,255,.85); margin:0 auto; }

  /* ----- pasta ----- */
  .pasta-wrap { position:absolute; inset:0; display:flex; flex-direction:column;
                align-items:center; justify-content:center; gap:2.5vmin; padding:2vmin 2vmin 8vmin; z-index:5; }
  .pasta-wrap svg.plate { width:clamp(180px, 42vmin, 360px); height:auto;
                          filter:drop-shadow(0 5px 6px rgba(0,0,0,.3)); }
  .food-row { display:flex; gap:2.6vmin; flex-wrap:wrap; justify-content:center;
              background:rgba(255,255,255,.35); border-radius:22px; padding:1.6vmin 2.4vmin; }
  .fooditem {
    width:clamp(54px,11.5vmin,88px); height:clamp(54px,11.5vmin,88px); border-radius:50%;
    border:none; touch-action:none; display:flex; align-items:center; justify-content:center;
    font-size:clamp(34px,8vmin,60px); background:none; box-shadow:none;
  }
  .fooditem.ball { box-shadow:0 4px 0 rgba(0,0,0,.25); }
  .fooditem.on-plate { pointer-events:none; animation:land .4s ease; }

  /* ----- trace ----- */
  #guideC, #inkC { position:absolute; inset:0; width:100%; height:100%; }
  #inkC { z-index:6; touch-action:none; }
  #guideC { z-index:5; }

  /* ----- memory ----- */
  .mem-grid { position:absolute; inset:0; display:flex; flex-wrap:wrap; gap:1.8vmin;
              align-content:center; justify-content:center; padding:2vmin; z-index:5; }
  .mem-card { border:none; background:none; perspective:700px; }
  .mem-inner { position:relative; width:100%; height:100%;
               transition:transform .45s; transform-style:preserve-3d; }
  .mem-card.flipped .mem-inner, .mem-card.matched .mem-inner { transform:rotateY(180deg); }
  .mem-face { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
              border-radius:14px; display:flex; align-items:center; justify-content:center;
              font-size:clamp(28px,6.6vmin,56px); box-shadow:0 5px 0 rgba(0,0,0,.2); }
  .mem-face.front { background:linear-gradient(#b07fe8,#7444c4); color:#fff; border:3px solid #fff; }
  .mem-face.back  { background:#fff; transform:rotateY(180deg); border:3px solid #ffd23e; }
  .mem-card.matched { animation:matchGlow .7s ease; }
  .mem-card.matched .mem-face.back { box-shadow:0 0 18px 4px #ffd23e; }
  @keyframes matchGlow { 40% { transform:scale(1.18); } }

  /* ----- music / animal band ----- */
  .music-stage { position:absolute; inset:0; display:flex; flex-direction:column;
                 align-items:center; justify-content:flex-end; padding-bottom:3vmin; z-index:5; }
  .music-note { position:absolute; font-size:clamp(22px,5vmin,40px); z-index:4; pointer-events:none;
                animation:noteUp 1.6s ease-out forwards; }
  @keyframes noteUp { to { transform:translateY(-30vh) rotate(20deg); opacity:0; } }

<script>
"use strict";
let NAME = localStorage.getItem("fionaName") || "Explorer";

const $ = id => document.getElementById(id);
const rand = arr => arr[Math.floor(Math.random() * arr.length)];
const shuffle = arr => arr.slice().sort(() => Math.random() - .5);
const randBetween = (a, b) => a + Math.random() * (b - a);
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const IRREGULAR = { snowman: "snowmen", reindeer: "reindeer" };
function plural(noun, n) {
  if (n === 1) return noun;
  if (IRREGULAR[noun]) return IRREGULAR[noun];
  if (/[^aeiou]y$/.test(noun)) return noun.slice(0, -1) + "ies";
  return noun + "s";
}

/* ================= Persistent state ================= */
const completions = JSON.parse(localStorage.getItem("fionaStars") || "{}"); // per-level completion count
const stickers = JSON.parse(localStorage.getItem("fionaStickers") || "[]");
let settings = Object.assign({ diff: "auto", voice: 1, music: "bouncy" },
  JSON.parse(localStorage.getItem("fionaSettings") || "{}"));
const saveCompletions = () => localStorage.setItem("fionaStars", JSON.stringify(completions));
const saveStickers = () => localStorage.setItem("fionaStickers", JSON.stringify(stickers));
const saveSettings = () => localStorage.setItem("fionaSettings", JSON.stringify(settings));

/* difficulty tier 0..2 for a level */
function tierFor(level) {
  if (settings.diff === "easy") return 0;
  if (settings.diff === "med") return 1;
  if (settings.diff === "hard") return 2;
  return clamp(completions[level] || 0, 0, 2);   // auto: grows with completions
}

const state = { level: null, round: 0, busy: false, tier: 0 };

/* ================= Mascot ================= */
function mascotSVG() {
  return `<svg viewBox="0 0 120 170" xmlns="http://www.w3.org/2000/svg">
    <path d="M27 116 L8 98" stroke="#8a5a2b" stroke-width="4" stroke-linecap="round"/>
    <path d="M14 104 L8 110" stroke="#8a5a2b" stroke-width="3.5" stroke-linecap="round"/>
    <g class="armR">
      <path d="M93 116 L112 96" stroke="#8a5a2b" stroke-width="4" stroke-linecap="round"/>
      <path d="M104 104 L113 107" stroke="#8a5a2b" stroke-width="3.5" stroke-linecap="round"/>
    </g>
    <circle cx="60" cy="128" r="36" fill="#fff" stroke="#dbe9f2" stroke-width="2"/>
    <circle cx="60" cy="120" r="3.2" fill="#26323a"/>
    <circle cx="60" cy="136" r="3.2" fill="#26323a"/>
    <circle cx="60" cy="62" r="26" fill="#fff" stroke="#dbe9f2" stroke-width="2"/>
    <path d="M36 84 Q60 97 84 84 L84 93 Q60 106 36 93 Z" fill="#e63946"/>
    <rect x="66" y="92" width="12" height="22" rx="5" fill="#e63946"/>
    <path d="M38 46 Q60 22 82 46 L82 52 Q60 42 38 52 Z" fill="#2f6fde"/>
    <circle cx="60" cy="28" r="7" fill="#fff" stroke="#dbe9f2" stroke-width="1.5"/>
    <g class="eyes">
      <circle cx="51" cy="57" r="3.4" fill="#26323a"/>
      <circle cx="69" cy="57" r="3.4" fill="#26323a"/>
    </g>
    <circle cx="45" cy="66" r="4" fill="#f8b3c0" opacity=".8"/>
    <circle cx="75" cy="66" r="4" fill="#f8b3c0" opacity=".8"/>
    <polygon points="60,61 60,68 82,65" fill="#f07f13"/>
    <path d="M50 74 Q60 81 70 74" stroke="#26323a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </svg>`;
}
function setMascots(cls, on) { document.querySelectorAll(".mascot").forEach(m => m.classList.toggle(cls, on)); }

let talkTimer = null, speakResume = null, lastSpeakEnd = 0;
function speak(text, opts = {}) {
  if (!settings.voice || !("speechSynthesis" in window)) { lastSpeakEnd = performance.now(); return; }
  if (!opts.queue) speechSynthesis.cancel();
  lastSpeakEnd = performance.now() + Math.min(7000, 500 + text.length * 72);   // estimated finish time
  const u = new SpeechSynthesisUtterance(text + " ");   // trailing space: stops Chrome clipping the last word
  u.rate = opts.rate || 0.95;
  u.pitch = opts.pitch || 1.25;
  setMascots("talking", true);
  clearTimeout(talkTimer);
  const stopTalk = () => {
    if (!speechSynthesis.speaking && !speechSynthesis.pending) {
      setMascots("talking", false);
      clearInterval(speakResume); speakResume = null;
    }
  };
  u.onend = stopTalk; u.onerror = stopTalk;
  talkTimer = setTimeout(() => setMascots("talking", false), Math.min(11000, 700 + text.length * 95));
  speechSynthesis.speak(u);
  // keep-alive: Chrome silently stops synthesis after ~15s unless nudged
  clearInterval(speakResume);
  speakResume = setInterval(() => {
    if (speechSynthesis.speaking) speechSynthesis.resume();
    else { clearInterval(speakResume); speakResume = null; }
  }, 4000);
}
// wait roughly as long as the praise takes to speak (capped) before running cb — so it's never cut off
function waitSpeech(cb, opts = {}) {
  const min = opts.min != null ? opts.min : 900, cap = opts.cap != null ? opts.cap : 4500;
  const wait = clamp(lastSpeakEnd - performance.now(), min, cap);
  setTimeout(cb, wait);
}

let actx = null;
function audio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === "suspended") actx.resume();
  return actx;
}
function tone(freq, start, dur, type = "sine", vol = 0.22) {
  const ctx = audio(), o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, ctx.currentTime + start);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
  o.connect(g).connect(ctx.destination);
  o.start(ctx.currentTime + start); o.stop(ctx.currentTime + start + dur);
}

function playStep(tune, i, st) {
  if (!musicOn) return;
  const [f, b] = tune[i % tune.length];
  if (f > 0) {
    tone(f, 0, st.beat * b * 0.00085, st.wave, .06);
    if (st.bass && i % 2 === 0) tone(f / 2, 0, st.beat * b * 0.0006, "sine", .05);
  }
  const atEnd = i % tune.length === tune.length - 1;
  if (atEnd && st.boing && Math.random() < .35) tone(rand([180, 200, 240]), st.beat * b * 0.0004, .18, "sawtooth", .05);
  const nextTune = atEnd && Math.random() < .4 ? rand(st.tunes) : tune;
  musicTimer = setTimeout(() => playStep(nextTune, i + 1, st), st.beat * b);
}
function startMusic() { audio(); musicOn = true; $("musicBtn").classList.add("on"); const st = curStyle(); playStep(rand(st.tunes), 0, st); }

/* ================= Fireworks + floaters ================= */
let fxRaf = null;
function fireworks() {
  const c = $("fxC"), ctx = c.getContext("2d");
  c.width = innerWidth; c.height = innerHeight;
  const parts = [];
  const burst = (x, y) => {
    const hue = Math.random() * 360;
    for (let i = 0; i < 55; i++) {
      const a = Math.random() * Math.PI * 2, v = randBetween(1.5, 7);
      parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
                   life: randBetween(45, 80), hue: hue + randBetween(-20, 20), r: randBetween(2, 4.5) });
    }
  };
  for (let i = 0; i < 4; i++)
    setTimeout(() => burst(randBetween(.2, .8) * c.width, randBetween(.15, .5) * c.height), i * 420);
  if (fxRaf) cancelAnimationFrame(fxRaf);
  const start = performance.now();
  const frame = () => {
    ctx.clearRect(0, 0, c.width, c.height);
    for (const p of parts) {
      if (p.life <= 0) continue;
      p.x += p.vx; p.y += p.vy; p.vy += .07; p.vx *= .985; p.life--;
      ctx.globalAlpha = Math.min(1, p.life / 35);
      ctx.fillStyle = `hsl(${p.hue}, 95%, 62%)`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (performance.now() - start < 3400) fxRaf = requestAnimationFrame(frame);
    else { ctx.clearRect(0, 0, c.width, c.height); fxRaf = null; }
  };
  fxRaf = requestAnimationFrame(frame);
}
function floaters(emojis, x, y, n = 8) {
  for (let i = 0; i < n; i++) {
    const f = document.createElement("div");
    f.className = "floater"; f.textContent = rand(emojis);
    f.style.left = (x + randBetween(-60, 60)) + "px";
    f.style.top = (y + randBetween(-20, 20)) + "px";
    f.style.animationDelay = (i * 0.05) + "s";
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1500);
  }
}

function wiggle(el) { el.classList.remove("shake"); void el.offsetWidth; el.classList.add("shake"); }

function makeDraggable(el, onRelease) {
  el.style.touchAction = "none";
  el.addEventListener("pointerdown", e => {
    if (state.busy || el.classList.contains("on-plate")) return;
    e.preventDefault();
    try { el.setPointerCapture(e.pointerId); } catch (_) {}
    const r = el.getBoundingClientRect();
    const offX = e.clientX - r.left, offY = e.clientY - r.top;
    const startX = e.clientX, startY = e.clientY;
    const orig = { pos: el.style.position, left: el.style.left, top: el.style.top, z: el.style.zIndex };
    let moved = false;
    const move = ev => {
      if (Math.hypot(ev.clientX - startX, ev.clientY - startY) > 7) moved = true;
      el.style.position = "fixed"; el.style.zIndex = 60;
      el.style.left = (ev.clientX - offX) + "px";
      el.style.top = (ev.clientY - offY) + "px";
    };
    const up = ev => {
      el.removeEventListener("pointermove", move);
      el.removeEventListener("pointerup", up);
      el.removeEventListener("pointercancel", up);
      onRelease(el, ev, {
        moved,
        reset() { el.style.position = orig.pos; el.style.left = orig.left; el.style.top = orig.top; el.style.zIndex = orig.z; }
      });
    };
    el.addEventListener("pointermove", move);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
  });
}
const centerOf = el => { const r = el.getBoundingClientRect(); return { x: r.left + r.width / 2, y: r.top + r.height / 2 }; };
const inside = (pt, el) => { const r = el.getBoundingClientRect(); return pt.x > r.left && pt.x < r.right && pt.y > r.top && pt.y < r.bottom; };

/* grid scatter (up to 12) so items never overlap */
function scatter(n) {
  const cols = 4, rows = 3;
  return shuffle([...Array(cols * rows).keys()]).slice(0, n).map(cell => {
    const c = cell % cols, r = Math.floor(cell / cols);
    return { left: (5 + c * 23 + Math.random() * 7) + "%", top: (6 + r * 30 + Math.random() * 7) + "%" };
  });
}

/* ================= Round / level flow ================= */
function cleanupLevel() { const l = LEVELS[state.level]; if (l && l.cleanup) l.cleanup(); }
function roundComplete() {
  state.busy = true;
  sfx.good();
  waitSpeech(() => {                       // let the praise finish talking first
    state.round++;
    drawProgress();
    if (state.round >= totalRounds()) levelComplete();
    else { state.busy = false; LEVELS[state.level].startRound(); }
  });
}
function levelComplete() { cleanupLevel(); celebrateWith(state.level); }
function celebrateWith(levelId, opts = {}) {
  completions[levelId] = (completions[levelId] || 0) + 1;
  saveCompletions();
  const sticker = rand(STICKER_POOL);
  stickers.push({ e: sticker });           // position assigned by the sticker book's grid
  saveStickers();
  sfx.win(); confetti(); fireworks();
  const leveledUp = !opts.noLevelUp && settings.diff === "auto" && completions[levelId] <= 2;
  $("celebText").textContent = `You did it, ${NAME}!`;
  $("celebSticker").textContent = sticker;
  $("celebSub").textContent = leveledUp ? "You earned a sticker — and a harder level next time! ⬆️"
                                        : "You earned a new sticker!";
  $("celebrate").classList.remove("hidden");
  speak(`Hooray! You did it, ${NAME}! You earned a new sticker!`);
}

/* ================= LEVEL: Magic tracing (shapes, numbers, letters) ================= */
const GLYPHS = {
  "1": [[[.5, .06], [.5, .94]], [[.33, .22], [.5, .06]]],
  "2": [[[.26, .28], [.4, .12], [.62, .12], [.74, .3], [.58, .52], [.3, .8], [.26, .94], [.78, .94]]],
  "3": [[[.28, .16], [.62, .1], [.74, .3], [.5, .5], [.74, .7], [.6, .92], [.28, .86]]],
  "F": [[[.32, .06], [.32, .94]], [[.32, .06], [.84, .06]], [[.32, .48], [.74, .48]]],
  "I": [[[.5, .06], [.5, .94]]],
  "N": [[[.26, .94], [.26, .06], [.74, .94], [.74, .06]]],
  "A": [[[.2, .94], [.5, .06], [.8, .94]], [[.33, .62], [.67, .62]]]

function sampleStrokes(strokes, w, h) {
  const padX = w * 0.30, padY = h * 0.13;
  const X = u => padX + u * (w - 2 * padX), Y = v => padY + v * (h - 2 * padY);

    for (let i = 0; i < st.length - 1; i++) {

      for (let j = 0; j < steps; j++) { const t = j / steps; pts.push({ x: X(ax + (bx - ax) * t), y: Y(ay + (by - ay) * t), hit: false }); }
    }
    const last = st[st.length - 1]; pts.push({ x: X(last[0]), y: Y(last[1]), hit: false });
  }
  return pts;
}
function glyphPoints(item, w, h) {
  const cx = w / 2, cy = h / 2, size = Math.min(w, h) * .33, pts = [];

  switch (item) {
    case "circle": ring(size, size, 44); return pts;
    case "oval":   ring(size * 1.2, size * .8, 44); return pts;
    case "square": poly([{ x: cx - size, y: cy - size }, { x: cx + size, y: cy - size }, { x: cx + size, y: cy + size }, { x: cx - size, y: cy + size }], 11); return pts;
    case "triangle": poly([{ x: cx, y: cy - size }, { x: cx + size, y: cy + size * .8 }, { x: cx - size, y: cy + size * .8 }], 14); return pts;
    case "diamond": poly([{ x: cx, y: cy - size }, { x: cx + size, y: cy }, { x: cx, y: cy + size }, { x: cx - size, y: cy }], 12); return pts;
    case "star": { const v = []; for (let i = 0; i < 10; i++) { const r = i % 2 === 0 ? size * 1.15 : size * .5; const a = i / 10 * Math.PI * 2 - Math.PI / 2; v.push({ x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r }); } poly(v, 5); return pts; }

  if (/[A-Z]/.test(item)) return { say: `Trace the letter ${item}!`, show: `✨ Trace the letter ${item}!` };

const traceLevel = {
  theme: "theme-trace", rounds: 5,
  startRound() {

      this.order = [
        ["circle", "square", "triangle", "star", "heart"],

        ["F", "I", "O", "N", "A"]                       // tier 2 spells her name!
      ][state.tier];
    }
    const item = this.order[state.round];
    this.item = item; this.done = false; this.hue = 0; this.last = null; this.hits = 0;
    const lab = traceLabel(item);
    setInstruction(lab.show, lab.say + " Follow the dots!");

    area.innerHTML = `<canvas id="guideC"></canvas><canvas id="inkC"></canvas>`;
    const rect = area.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    for (const id of ["guideC", "inkC"]) { const c = $(id); c.width = rect.width * dpr; c.height = rect.height * dpr; c.getContext("2d").scale(dpr, dpr); }

    if (card.classList.contains("flipped") || card.classList.contains("matched")) return;
    sfx.tick(); card.classList.add("flipped");
    if (!this.first) { this.first = card; return; }
    const a = this.first, b = card; this.first = null;
    if (a.dataset.emoji === b.dataset.emoji) {
      this.locked = true;
      setTimeout(() => {
        a.classList.add("matched"); b.classList.add("matched");
        a.classList.remove("flipped"); b.classList.remove("flipped");
        sfx.good(); this.locked = false; this.remaining--;
        if (this.remaining > 0) speak(`A match! Two ${plural(a.dataset.word, 2)}!`);
        else { speak(`You found them all! ${praise()}`); roundComplete(); }
      }, 550);
    } else {
      this.locked = true; sfx.bad();
      setTimeout(() => { a.classList.remove("flipped"); b.classList.remove("flipped"); this.locked = false; }, 1000);

  }
};

/* ================= LEVEL: Star Patterns (sequencing) ================= */
const PAT_PALETTES = [["🔴", "🔵"], ["⭐", "🌙"], ["🟣", "🟢"], ["🔴", "🟡", "🔵"], ["❤️", "💛", "💚"], ["🌟", "☄️", "🪐"]];
const patternLevel = {
  theme: "theme-space", rounds: 5,
  startRound() {
    const types = state.tier === 0 ? ["AB"] : state.tier === 1 ? ["AB", "ABC", "AAB"] : ["ABC", "AAB", "ABB"];
    this.type = rand(types);
    const distinct = new Set(this.type).size;
    const pal = rand(PAT_PALETTES.filter(p => p.length >= distinct));
    const unit = this.type.split("").map(ch => pal["ABC".indexOf(ch)]);
    const reps = state.tier + 2;
    const full = [];
    for (let r = 0; r < reps; r++) full.push(...unit);
    this.answer = full[full.length - 1];
    const shown = full.slice(0, full.length - 1);
    setInstruction(`🔮 What comes next?`, `Look at the pattern! What comes next?`);
    $("playArea").innerHTML = `<div class="space-bg" id="spaceBg"></div>
      <div class="pattern-row" id="patRow"></div>
      <div class="pattern-choices" id="patChoices"></div>`;
    addStars($("spaceBg"));
    shown.forEach(x => { const d = document.createElement("div"); d.className = "patcell"; d.textContent = x; $("patRow").appendChild(d); });
    const q = document.createElement("div"); q.className = "patcell q"; q.textContent = "❓"; $("patRow").appendChild(q);
    let choices = [...new Set(pal)];
    if (!choices.includes(this.answer)) choices.push(this.answer);
    shuffle(choices).forEach(x => {
      const b = document.createElement("button"); b.className = "patchoice"; b.textContent = x;
      b.onclick = e => this.tap(b, x, e); $("patChoices").appendChild(b);
    });
  },
  tap(b, x, e) {
    if (state.busy) return;
    if (x === this.answer) {
      b.classList.add("popped");
      const q = document.querySelector(".patcell.q"); if (q) { q.textContent = x; q.classList.remove("q"); }
      miniStar(e.clientX, e.clientY); speak(praise()); roundComplete();
    } else { sfx.bad(); wiggle(b); speak("Try again! Look at the pattern!"); }
  }
};

const paint = {
  colors: ["#e63946", "#f07f13", "#f4c726", "#3fa84f", "#2f6fde", "#8e4fd0", "#f06ba8", "#8a5a2b", "#2b2b2b"],
  stamps: ["⭐", "❤️", "🌸", "🦋", "❄️", "🐠", "🌈", "🍩"],
  outlines: ["snowman", "flower", "fish", "butterfly", "star", "heart"],
  color: "#e63946", mode: "draw", stampIdx: 0, last: null,
  show() {
    cleanupLevel();
    if ("speechSynthesis" in window) speechSynthesis.cancel();
    ["hub", "game", "celebrate", "stickerbook", "story", "settings", "games"].forEach(id => $(id).classList.add("hidden"));
    $("paint").classList.remove("hidden");
    document.body.className = "theme-trace";
    this.mode = "draw";
    this.outline = rand(this.outlines);
    this.buildSwatches();
    $("paintStamp").textContent = this.stamps[this.stampIdx];
    $("paintStamp").classList.remove("on"); $("paintErase").classList.remove("on");
    this.setup();
    speak(`Let's paint! Pick a color and draw with your finger, ${NAME}!`);
  },
  buildSwatches() {
    const w = $("swatches"); w.innerHTML = "";
    this.colors.forEach((c, i) => {
      const b = document.createElement("button");
      b.className = "swatch" + (i === 0 ? " sel" : ""); b.style.background = c;
      b.onclick = () => { this.color = c; this.mode = "draw"; this.markSel(b); $("paintStamp").classList.remove("on"); $("paintErase").classList.remove("on"); };
      w.appendChild(b);
    });
    this.color = this.colors[0];
  },
  markSel(b) { document.querySelectorAll(".swatch").forEach(s => s.classList.toggle("sel", s === b)); },
  setup() {
    const wrap = $("paintCanvasWrap"), c = $("paintC");
    const r = wrap.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
    c.width = r.width * dpr; c.height = r.height * dpr;
    const ctx = c.getContext("2d"); ctx.scale(dpr, dpr);
    this.w = r.width; this.h = r.height; this.ctx = ctx;
    this.redraw();
    const pos = e => { const b = c.getBoundingClientRect(); return { x: e.clientX - b.left, y: e.clientY - b.top }; };
    c.onpointerdown = e => {
      e.preventDefault(); try { c.setPointerCapture(e.pointerId); } catch (_) {}
      const p = pos(e);
      if (this.mode === "stamp") this.stamp(p);
      else { this.last = p; this.draw(p); }
    };
    c.onpointermove = e => { if (this.last && this.mode !== "stamp") { const p = pos(e); this.draw(p); this.last = p; } };
    const stop = () => this.last = null;
    c.onpointerup = stop; c.onpointercancel = stop;
  },
  redraw() { this.ctx.clearRect(0, 0, this.w, this.h); this.drawOutline(); },
  drawOutline() {
    const ctx = this.ctx, cx = this.w / 2, cy = this.h / 2, s = Math.min(this.w, this.h) * 0.3;
    ctx.save(); ctx.strokeStyle = "rgba(150,150,160,.45)"; ctx.lineWidth = 4; ctx.setLineDash([9, 9]); ctx.lineCap = "round";
    const o = this.outline;
    if (o === "snowman") { ctx.beginPath(); ctx.arc(cx, cy + s * 0.6, s * 0.62, 0, 7); ctx.stroke(); ctx.beginPath(); ctx.arc(cx, cy - s * 0.5, s * 0.42, 0, 7); ctx.stroke(); }
    else if (o === "flower") { for (let i = 0; i < 6; i++) { const a = i / 6 * Math.PI * 2; ctx.beginPath(); ctx.arc(cx + Math.cos(a) * s * 0.62, cy + Math.sin(a) * s * 0.62, s * 0.32, 0, 7); ctx.stroke(); } ctx.beginPath(); ctx.arc(cx, cy, s * 0.34, 0, 7); ctx.stroke(); }
    else if (o === "fish") { ctx.beginPath(); ctx.ellipse(cx - s * 0.2, cy, s * 0.8, s * 0.5, 0, 0, 7); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx + s * 0.6, cy); ctx.lineTo(cx + s, cy - s * 0.45); ctx.lineTo(cx + s, cy + s * 0.45); ctx.closePath(); ctx.stroke(); }
    else if (o === "butterfly") { [[-0.45, -0.3, 0.4, 0.5], [0.45, -0.3, 0.4, 0.5], [-0.4, 0.42, 0.33, 0.42], [0.4, 0.42, 0.33, 0.42]].forEach(([dx, dy, rx, ry]) => { ctx.beginPath(); ctx.ellipse(cx + dx * s, cy + dy * s, rx * s, ry * s, 0, 0, 7); ctx.stroke(); }); }
    else if (o === "star") { ctx.beginPath(); for (let i = 0; i < 10; i++) { const r = i % 2 ? s * 0.46 : s; const a = i / 10 * Math.PI * 2 - Math.PI / 2; const X = cx + Math.cos(a) * r, Y = cy + Math.sin(a) * r; i ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y); } ctx.closePath(); ctx.stroke(); }
    else { ctx.beginPath(); for (let t = 0; t <= Math.PI * 2 + 0.1; t += 0.12) { const X = cx + 16 * Math.pow(Math.sin(t), 3) * s / 16; const Y = cy - (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * s / 16; t ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y); } ctx.closePath(); ctx.stroke(); }
    ctx.restore();
  },
  draw(p) {
    const ctx = this.ctx;
    ctx.lineCap = ctx.lineJoin = "round";
    ctx.lineWidth = this.mode === "erase" ? 38 : 18;
    ctx.globalCompositeOperation = this.mode === "erase" ? "destination-out" : "source-over";
    ctx.strokeStyle = this.color;
    ctx.beginPath(); ctx.moveTo(this.last.x, this.last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
    ctx.globalCompositeOperation = "source-over";
  },
  stamp(p) {
    const ctx = this.ctx;
    ctx.font = `${Math.min(this.w, this.h) * 0.13}px serif`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(this.stamps[this.stampIdx], p.x, p.y);
    sfx.tick();
  }
};

  { theme: "theme-space", art: "🚀🌙⭐", text: "Then {n} put on a shiny space helmet and zoomed to the moon in a rocket! Five, four, three, two, one... blast off! She counted the twinkly stars up high.", tapEmoji: ["⭐", "🚀", "🪐"], tapSound: () => tone(130, 0, .5, "sawtooth", .15) },
  { theme: "theme-story", art: "🌈⭐💖", text: "As the sun set, {n} flew home, happy and sleepy. “What a wonderful day!” she yawned. Goodnight, {n}. The End. 💖", tapEmoji: ["⭐", "🌙", "💖"], tapSound: () => sfx.good(), last: true }
];
let storyPage = 0;
function showStory() {
  cleanupLevel();
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  ["game", "celebrate", "stickerbook", "hub", "settings", "paint", "games"].forEach(id => $(id).classList.add("hidden"));
  $("story").classList.remove("hidden");
  storyPage = 0;
  renderStory();
}
function renderStory() {
  const p = STORY[storyPage];
  document.body.className = p.theme;
  const scene = $("storyScene");
  scene.className = "story-scene";
  scene.innerHTML = `<div class="story-art">${p.art}</div>
      <div class="story-textbox">${fillName(p.text)}</div>
      <div class="story-tap-hint">👆 Tap the picture!</div>`;
  scene.onclick = e => { floaters(p.tapEmoji, e.clientX || innerWidth / 2, e.clientY || innerHeight / 2, 7); if (p.tapSound) p.tapSound(); };
  $("storyDots").innerHTML = STORY.map((_, i) => `<div class="sdot ${i === storyPage ? "on" : ""}"></div>`).join("");
  $("storyPrev").style.visibility = storyPage === 0 ? "hidden" : "visible";
  $("storyNext").textContent = p.last ? "🎉" : "▶️";
  speak(fillName(p.text));
}
function storyNav(dir) {
  const p = STORY[storyPage];
  if (dir > 0 && p.last) { confetti(); sfx.win(); speak(`The end! Goodnight, ${NAME}!`); setTimeout(showHub, 1800); return; }
  storyPage = clamp(storyPage + dir, 0, STORY.length - 1);
  renderStory();
}

/* ================= Sticker book ================= */
function slotPositions(n) {
  const cols = n <= 2 ? 2 : n <= 6 ? 3 : 4;
  const rows = Math.ceil(n / cols);
  const pos = [];
  for (let i = 0; i < n; i++) {
    const c = i % cols, r = Math.floor(i / cols);
    pos.push({ x: 10 + (c + 0.5) * (80 / cols), y: 9 + (r + 0.5) * (70 / rows) });
  }
  return pos;
}
function nearestSlot(slots, x, y) {
  let best = 0, bd = Infinity;
  slots.forEach((p, i) => { const d = Math.hypot(p.x - x, p.y - y); if (d < bd) { bd = d; best = i; } });
  return best;
}
function showStickerBook() {
  cleanupLevel();
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  document.body.className = "";
  ["hub", "game", "celebrate", "story", "settings", "paint", "games"].forEach(id => $(id).classList.add("hidden"));
  $("stickerbook").classList.remove("hidden");
  const scene = $("stickerScene");
  scene.innerHTML = `<div style="position:absolute; bottom:1vmin; width:100%; text-align:center; font-size:clamp(24px,6vmin,46px); pointer-events:none;">🌳 🛝 ⛲ 🌷 🌳</div>`;
  if (!stickers.length) { $("stickerHint").textContent = "Play the games to earn stickers!"; speak("Play the games to earn stickers!"); return; }
  $("stickerHint").textContent = "Drag each sticker onto a spot!";
  speak(`Here is your sticker book, ${NAME}! Drag your stickers onto the spots!`);

  const n = stickers.length;
  const slots = slotPositions(n);
  // make sure every sticker has a unique slot index
  const used = new Set(stickers.filter(s => s.slot != null && s.slot < n).map(s => s.slot));
  let free = 0;
  stickers.forEach(s => { if (s.slot == null || s.slot >= n || [...used].filter(u => u === s.slot).length > 1) { while (used.has(free)) free++; s.slot = free; used.add(free); } });
  saveStickers();

  slots.forEach((p, i) => {
    const o = document.createElement("div");
    o.className = "slot"; o.dataset.slot = i;
    o.style.left = p.x + "%"; o.style.top = p.y + "%";
    scene.appendChild(o);
  });
  stickers.forEach(st => {
    const p = slots[st.slot];
    const el = document.createElement("div");
    el.className = "sticker"; el.textContent = st.e;
    el.style.left = p.x + "%"; el.style.top = p.y + "%";
    el.addEventListener("pointerdown", e => {
      e.preventDefault(); try { el.setPointerCapture(e.pointerId); } catch (_) {}
      el.style.zIndex = 20;
      const pct = ev => { const r = scene.getBoundingClientRect(); return { x: clamp((ev.clientX - r.left) / r.width * 100, 2, 98), y: clamp((ev.clientY - r.top) / r.height * 100, 2, 97) }; };
      const move = ev => {
        const q = pct(ev); el.style.left = q.x + "%"; el.style.top = q.y + "%";
        const ni = nearestSlot(slots, q.x, q.y);
        document.querySelectorAll(".slot").forEach(o => o.classList.toggle("hover", +o.dataset.slot === ni));
      };
      const up = ev => {
        el.removeEventListener("pointermove", move); el.removeEventListener("pointerup", up);
        const q = pct(ev), ni = nearestSlot(slots, q.x, q.y);
        const occ = stickers.find(s => s !== st && s.slot === ni);
        if (occ) occ.slot = st.slot;          // swap into the spot it left
        st.slot = ni; saveStickers(); sfx.tick();
        showStickerBook();                      // re-render snapped into place
      };
      el.addEventListener("pointermove", move); el.addEventListener("pointerup", up);
    });
    scene.appendChild(el);
  });
}

/* ================= Settings ================= */
function openSettings() {
  $("settings").classList.remove("hidden");
  document.querySelectorAll("#segDiff button").forEach(b => b.classList.toggle("sel", b.dataset.d === settings.diff));
  document.querySelectorAll("#segVoice button").forEach(b => b.classList.toggle("sel", String(settings.voice) === b.dataset.v));
  document.querySelectorAll("#segMusic button").forEach(b => b.classList.toggle("sel", b.dataset.m === settings.music));
}
function showCharScreen(returnTo) {
  ["hub", "game", "celebrate", "stickerbook", "story", "settings", "paint", "games", "namescreen"].forEach(id => $(id).classList.add("hidden"));
  $("charscreen").classList.remove("hidden");
  $("charDone").dataset.return = returnTo || "hub";
  const grid = $("charGrid"); grid.innerHTML = "";
  BUDDIES.forEach(b => {
    const btn = document.createElement("button");
    btn.className = "char-btn" + (b.id === BUDDY ? " sel" : "");
    btn.innerHTML = `<span class="ch-e">${b.e}</span><span class="ch-n">${b.name}</span>`;
    btn.onclick = () => {
      BUDDY = b.id; localStorage.setItem("fionaBuddy", BUDDY); localStorage.setItem("fionaBuddySet", "1");
      refreshBuddies(); sfx.tap(); speak(b.name + "!");
      grid.querySelectorAll(".char-btn").forEach(x => x.classList.remove("sel")); btn.classList.add("sel");
    };
    grid.appendChild(btn);
  });
}

/* ================= Navigation ================= */
function showHub() {
  cleanupLevel();
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  setMascots("talking", false);
  document.body.className = "";
  ["game", "celebrate", "stickerbook", "story", "settings", "paint", "games"].forEach(id => $(id).classList.add("hidden"));
  $("hub").classList.remove("hidden");
  buildHub();
}
function startLevel(name) {
  audio(); cleanupLevel();
  state.level = name; state.round = 0; state.busy = false; state.tier = tierFor(name);
  document.body.className = LEVELS[name].theme;
  ["hub", "celebrate", "stickerbook", "story", "settings", "paint", "games"].forEach(id => $(id).classList.add("hidden"));
  $("game").classList.remove("hidden");
  drawProgress();
  LEVELS[name].startRound();
}

refreshBuddies();
buildHub();
document.addEventListener("contextmenu", e => e.preventDefault());   // no right-click / long-press menus for little hands
$("homeBtn").onclick = showHub;
$("gamesHome").onclick = showHub;
$("celebHome").onclick = showHub;
$("celebBook").onclick = showStickerBook;

$("settingsBtn").onclick = openSettings;
$("setDone").onclick = () => { $("settings").classList.add("hidden"); };
$("setReset").onclick = () => {
  if (confirm("Reset all of " + NAME + "'s stars and stickers?")) {
    for (const k in completions) delete completions[k];
    stickers.length = 0; saveCompletions(); saveStickers(); buildHub();
  }
};
$("setName").onclick = () => { $("settings").classList.add("hidden"); showNameScreen(NAME); };
document.querySelectorAll("#segDiff button").forEach(b => b.onclick = () => { settings.diff = b.dataset.d; saveSettings(); openSettings(); });
document.querySelectorAll("#segVoice button").forEach(b => b.onclick = () => { settings.voice = +b.dataset.v; saveSettings(); openSettings(); });
document.querySelectorAll("#segMusic button").forEach(b => b.onclick = () => {
  settings.music = b.dataset.m; saveSettings();
  if (settings.music === "off") stopMusic(); else { stopMusic(); startMusic(); }
  openSettings();
});
$("setBuddy").onclick = () => { $("settings").classList.add("hidden"); showCharScreen("settings"); };
$("charDone").onclick = () => { $("charDone").dataset.return === "settings" ? openSettings() : showHub(); };
$("storyHome").onclick = showHub;
$("storyPrev").onclick = () => storyNav(-1);
$("storyNext").onclick = () => storyNav(1);
$("storyRead").onclick = () => speak(fillName(STORY[storyPage].text));
$("paintHome").onclick = showHub;
$("paintStamp").onclick = () => {
  if (paint.mode !== "stamp") paint.mode = "stamp";
  else paint.stampIdx = (paint.stampIdx + 1) % paint.stamps.length;
  $("paintStamp").textContent = paint.stamps[paint.stampIdx];
  $("paintStamp").classList.add("on"); $("paintErase").classList.remove("on");
};
$("paintErase").onclick = () => { paint.mode = "erase"; $("paintErase").classList.add("on"); $("paintStamp").classList.remove("on"); };
$("paintClear").onclick = () => paint.redraw();
$("paintDone").onclick = () => { celebrateWith("paint", { noLevelUp: true }); };

/* ---- name entry ---- */
function showNameScreen(prefill) {
  $("nameMascot").innerHTML = mascotSVG();
  $("nameInput").value = prefill || "";
  ["hub", "game", "celebrate", "stickerbook", "story", "settings", "paint", "games"].forEach(id => $(id).classList.add("hidden"));
  $("namescreen").classList.remove("hidden");
  setTimeout(() => { try { $("nameInput").focus(); } catch (_) {} }, 250);
}
function commitName() {
  audio();
  const v = $("nameInput").value.trim();
  NAME = v ? v.slice(0, 12) : "Explorer";
  localStorage.setItem("fionaName", NAME);
  localStorage.setItem("fionaNameSet", "1");
  applyName();
  $("namescreen").classList.add("hidden");
  if (settings.music !== "off" && !musicOn) startMusic();   // kick off the happy background tune
  speak(`Hi ${NAME}! Let's play!`);
  if (!localStorage.getItem("fionaBuddySet")) showCharScreen("hub");   // first run: pick a buddy next
  else showHub();
}
$("nameStart").onclick = commitName;
$("nameSkip").onclick = () => {
  NAME = $("nameInput").value.trim().slice(0, 12) || "Explorer";
  localStorage.setItem("fionaName", NAME); localStorage.setItem("fionaNameSet", "1");
  applyName(); $("namescreen").classList.add("hidden");
  if (settings.music !== "off" && !musicOn) startMusic();
  if (!localStorage.getItem("fionaBuddySet")) showCharScreen("hub"); else showHub();
};
$("nameInput").addEventListener("keydown", e => { if (e.key === "Enter") commitName(); });

applyName();
if (!localStorage.getItem("fionaNameSet")) showNameScreen("");
else showHub();

if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
