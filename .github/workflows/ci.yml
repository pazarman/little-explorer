name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Smoke test (boots + plays a game, no console errors)
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
# Promotion path: once this is green a few times, gate the deploy on it by adding
# `needs: [validate, smoke]` to the deploy job in pages-deploy.yml (or make this a
# required status check in branch protection).
